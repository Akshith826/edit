<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>SpaceVerse - Stereoscopic VR Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@700;900&display=swap"
        rel="stylesheet">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Inter', sans-serif;
            color: #e2e8f0;
            touch-action: none;
        }

        #vr-overlay {
            position: absolute;
            inset: 0;
            z-index: 50;
            background: rgba(5, 5, 16, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .vr-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: #00f3ff;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.6);
            margin-bottom: 2rem;
            text-align: center;
            letter-spacing: 2px;
        }

        .vr-desc {
            max-width: 500px;
            text-align: center;
            margin-bottom: 3rem;
            line-height: 1.6;
            color: rgba(226, 232, 240, 0.8);
        }

        .btn {
            padding: 18px 40px;
            background: rgba(20, 20, 40, 0.6);
            border: 1px solid #00f3ff;
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            color: #00f3ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 2px 10px rgba(0, 243, 255, 0.1);
            margin-bottom: 1.5rem;
            display: block;
            width: 100%;
            max-width: 320px;
            text-transform: uppercase;
            text-align: center;
            text-decoration: none;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: rgba(0, 243, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 243, 255, 0.5);
            color: #fff;
            transform: translateY(-3px);
        }

        .btn-secondary {
            background: transparent;
            border-color: rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            box-shadow: none;
        }

        .btn-secondary:hover {
            border-color: #fff;
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        /* Essential UI that sits on top of the webgl canvas when running */
        #fixed-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: none;
            /* hidden until VR starts */
        }

        .btn-back-small {
            padding: 10px 20px;
            background: rgba(5, 5, 16, 0.7);
            border: 1px solid rgba(0, 243, 255, 0.4);
            border-radius: 12px;
            color: #00f3ff;
            font-weight: bold;
            text-decoration: none;
            backdrop-filter: blur(10px);
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .btn-back-small:hover {
            background: rgba(0, 243, 255, 0.2);
            color: white;
        }
    </style>
</head>

<body>
    <div id="vr-overlay">
        <div class="vr-title">VR EXPLORER</div>
        <div class="vr-desc">
            Place your phone into a VR headset (like Google Cardboard) for the best experience. The lenses will split
            automatically.
            Ensure screen orientation lock is turned off.
        </div>
        <button class="btn" id="start-vr-btn">START VR (MOBILE)</button>
        <button class="btn btn-secondary" id="start-desktop-btn">3D DESKTOP PREVIEW</button>
        <a href="/solar-system" class="btn btn-secondary"
            style="margin-top:20px; max-width:200px; padding:12px; font-size:0.9rem;">← Go Back</a>
    </div>

    <div id="fixed-ui">
        <a href="/solar-system" class="btn-back-small">← Exit VR</a>
    </div>

    <!-- Import Map for Native ESM Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { StereoEffect } from 'three/addons/effects/StereoEffect.js';
        import { DeviceOrientationControls } from 'three/addons/controls/DeviceOrientationControls.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let camera, scene, renderer;
        let effect, controls;
        let cameraGroup;
        let planets = [];
        let sun;

        const planetData = [
            { name: 'mercury', radius: 0.8, distance: 16, speed: 0.04, texture: '/public/textures/mercury.jpg' },
            { name: 'venus', radius: 1.5, distance: 24, speed: 0.015, texture: '/public/textures/venus.jpg' },
            { name: 'earth', radius: 1.6, distance: 32, speed: 0.01, texture: '/public/textures/earth.jpg' },
            { name: 'mars', radius: 1.2, distance: 40, speed: 0.008, texture: '/public/textures/mars.jpg' },
            { name: 'jupiter', radius: 4.5, distance: 60, speed: 0.002, texture: '/public/textures/jupiter.jpg' },
            { name: 'saturn', radius: 3.8, distance: 82, speed: 0.0009, texture: '/public/textures/saturn.jpg', ring: '/public/textures/saturn-ring.png' },
            { name: 'uranus', radius: 2.5, distance: 105, speed: 0.0004, texture: '/public/textures/uranus.jpg' },
            { name: 'neptune', radius: 2.4, distance: 125, speed: 0.0001, texture: '/public/textures/neptune.jpg' }
        ];

        document.getElementById('start-vr-btn').addEventListener('click', () => {
            // iOS 13+ requires explicit permission for DeviceMotionEvent
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            startExperience(true);
                        } else {
                            alert('Gyroscope permissions are required for VR head tracking.');
                        }
                    })
                    .catch(console.error);
            } else {
                startExperience(true);
            }
        });

        document.getElementById('start-desktop-btn').addEventListener('click', () => {
            startExperience(false);
        });

        function startExperience(isVR) {
            document.getElementById('vr-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('vr-overlay').style.display = 'none';
                document.getElementById('fixed-ui').style.display = 'block';
            }, 500);

            initScene(isVR);
            animate();
        }

        function initScene(isVR) {
            const container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();

            // The Camera needs a wrapping group so DeviceOrientationControls can rotate it locally
            // while we position the group anywhere in the solar system
            cameraGroup = new THREE.Group();
            cameraGroup.position.set(0, 15, 65); // Give a majestic angled view of the solar system
            scene.add(cameraGroup);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            cameraGroup.add(camera);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            if (isVR) {
                // Initialize the cardboard split-screen stereo effect
                effect = new StereoEffect(renderer);
                effect.setSize(window.innerWidth, window.innerHeight);

                // Initialize gyroscope controls
                controls = new DeviceOrientationControls(camera);
                // The controls rotate the camera independently, so it always looks forward based on phone
            } else {
                // Desktop fallback: standard orbit controls attached to the camera group
                // to allow panning around the sun
                controls = new OrbitControls(cameraGroup, renderer.domElement);
                controls.enableDamping = true;
                controls.dampingFactor = 0.05;
                cameraGroup.lookAt(0, 0, 0); // look at sun natively
                camera.position.set(0, 0, 0); // ensure camera is centered in the group
            }

            // Lighting setup for depth
            const ambientLight = new THREE.AmbientLight(0x222233);
            scene.add(ambientLight);

            // Sun acts as point light source in the center, casting light outwards
            const pointLight = new THREE.PointLight(0xffffff, 3, 500);
            scene.add(pointLight);

            // Build immersive starfield environment
            createStarfield();

            const textureLoader = new THREE.TextureLoader();

            // Create Sun (Glowing material natively)
            const sunGeo = new THREE.SphereGeometry(9, 64, 64);
            const sunMat = new THREE.MeshBasicMaterial({ color: 0xffdd44 });
            sun = new THREE.Mesh(sunGeo, sunMat);
            scene.add(sun);

            // Atmosphere glow around sun
            const sunAtmoGeo = new THREE.SphereGeometry(9.6, 32, 32);
            const sunAtmoMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.25 });
            const sunAtmo = new THREE.Mesh(sunAtmoGeo, sunAtmoMat);
            scene.add(sunAtmo);

            // Create Planets and Orbits
            planetData.forEach((pd) => {
                const group = new THREE.Group();
                scene.add(group);

                const pGeo = new THREE.SphereGeometry(pd.radius, 64, 64);
                const pMat = new THREE.MeshStandardMaterial({
                    map: textureLoader.load(pd.texture),
                    roughness: 0.7,
                    metalness: 0.1
                });

                const mesh = new THREE.Mesh(pGeo, pMat);
                mesh.position.x = pd.distance;
                group.add(mesh);

                if (pd.ring) {
                    const rGeo = new THREE.RingGeometry(pd.radius + 1.2, pd.radius + 3.8, 64);
                    const rMat = new THREE.MeshBasicMaterial({
                        map: textureLoader.load(pd.ring),
                        side: THREE.DoubleSide,
                        transparent: true,
                        opacity: 0.85
                    });
                    const ring = new THREE.Mesh(rGeo, rMat);
                    ring.rotation.x = Math.PI / 2 + 0.2;
                    mesh.add(ring);
                }

                // Add an orbital path line to visualize the system structure
                const pathGeo = new THREE.RingGeometry(pd.distance, pd.distance + 0.05, 128);
                const pathMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.05 });
                const pathMesh = new THREE.Mesh(pathGeo, pathMat);
                pathMesh.rotation.x = Math.PI / 2;
                scene.add(pathMesh);

                planets.push({
                    group: group,
                    mesh: mesh,
                    speed: pd.speed
                });
            });

            window.addEventListener('resize', onWindowResize);
        }

        function createStarfield() {
            const starGeo = new THREE.BufferGeometry();
            const starVertices = [];
            for (let i = 0; i < 15000; i++) {
                const r = 400 + Math.random() * 600;
                const theta = Math.random() * 2 * Math.PI;
                const phi = Math.acos(2 * Math.random() - 1);
                const x = r * Math.sin(phi) * Math.cos(theta);
                const y = r * Math.sin(phi) * Math.sin(theta);
                const z = r * Math.cos(phi);
                starVertices.push(x, y, z);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, transparent: true, opacity: 0.8 });
            const stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();

            if (effect) {
                effect.setSize(window.innerWidth, window.innerHeight);
            } else {
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            if (controls) controls.update();

            const time = Date.now() * 0.001;

            if (sun) sun.rotation.y = time * 0.05;

            planets.forEach((p) => {
                p.group.rotation.y += p.speed;
                p.mesh.rotation.y += 0.01;
            });

            if (effect) {
                effect.render(scene, camera);
            } else {
                renderer.render(scene, camera);
            }
        }
    </script>
</body>

</html>
