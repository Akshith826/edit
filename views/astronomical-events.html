<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astronomical Events Calendar</title>
    <style>
        :root {
            --space-dark: #050510;
            --space-light: #1a1a3a;
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-amber: #ffb703;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --text-main: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #000000;
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Canvas Space Background */
        #space-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            display: block;
        }

                .navbar {
            position: fixed;
            top: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            width: 98%;
            max-width: 1800px;
            
            /* Sci-Fi Geometry (Chamfered Tech Box) */
            clip-path: polygon(25px 0, calc(100% - 25px) 0, 100% 25px, 100% calc(100% - 25px), calc(100% - 25px) 100%, 25px 100%, 0 calc(100% - 25px), 0 25px);
            
            /* Frosty Glassmorphism */
            background: rgba(5, 10, 20, 0.7);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            
            padding: 0.8rem 2.5rem;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            
            /* Inner telemetry glow and structural pseudo-bordering through shadows */
            box-shadow: inset 0 0 20px rgba(0, 243, 255, 0.15), inset 0 0 60px rgba(0, 0, 0, 0.9);
            transition: all 0.4s ease;
            border: none;
        }

        /* Nav Brackets matching the clip-path angles perfectly */
        .nav-bracket {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 35px;
            background: transparent;
            pointer-events: none;
            z-index: 10;
        }
        .nav-bracket.left {
            left: 0;
            border-left: 2px solid var(--neon-blue);
            clip-path: polygon(0 25px, 25px 0, 100% 0, 100% 100%, 25px 100%, 0 calc(100% - 25px));
            box-shadow: inset 10px 0 20px -5px rgba(0, 243, 255, 0.4);
        }
        .nav-bracket.right {
            right: 0;
            border-right: 2px solid var(--neon-blue);
            clip-path: polygon(0 0, calc(100% - 25px) 0, 100% 25px, 100% calc(100% - 25px), calc(100% - 25px) 100%, 0 100%);
            box-shadow: inset -10px 0 20px -5px rgba(0, 243, 255, 0.4);
        }

        .navbar:hover {
            box-shadow: inset 0 0 30px rgba(0, 243, 255, 0.25), inset 0 0 80px rgba(0, 0, 0, 0.95);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--neon-blue);
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.6);
            display: flex;
            align-items: center;
            gap: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-planet {
            width: 30px;
            height: 30px;
            background: radial-gradient(circle at 30% 30%, var(--neon-blue), #005b99);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.8), inset -5px -5px 10px rgba(0, 0, 0, 0.4);
            animation: planetRotate 10s linear infinite;
        }

        .logo-ring {
            position: absolute;
            width: 48px;
            height: 14px;
            border: 2px solid var(--neon-purple);
            border-radius: 50%;
            transform: rotateX(70deg);
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.8);
            animation: ringPulse 3s infinite alternate;
        }

        @keyframes planetRotate {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes ringPulse {
            100% {
                box-shadow: 0 0 25px rgba(188, 19, 254, 1);
                border-width: 3px;
            }
        }

        .nav-content {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            flex-grow: 1;
            margin-left: 2rem;
            position: static;
        }

        .nav-links {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 2.5rem;
            list-style: none;
            margin: 0;
        }

        .nav-links li, .nav-links a {
            display: inline-block;
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            letter-spacing: 0.5px;
            position: relative;
            padding: 0.5rem 0;
            transition: color 0.3s;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s cubic-bezier(0.86, 0, 0.07, 1);
        }

        .nav-links a:hover {
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.8);
        }

        .nav-links a:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        /* Scanning laser above the link */
        .nav-links a::before {
            content: '';
            position: absolute;
            top: -4px;
            left: 0;
            width: 15px;
            height: 2px;
            background: #fff;
            box-shadow: 0 0 10px #fff, 0 0 20px var(--neon-blue);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .nav-links a:hover::before {
            opacity: 1;
            animation: scanLaser 1s infinite linear;
        }

        @keyframes scanLaser {
            0% { left: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { left: 100%; opacity: 0; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 140px 2rem 50px;
            position: relative;
            z-index: 10;
        }

        .header {
            text-align: center;
            margin-bottom: 3.5rem;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            color: #fff;
            text-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
        }

        .header h1 .title-text {
            background: linear-gradient(180deg, #ffffff 0%, var(--neon-blue) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header h1 span {
            -webkit-text-fill-color: initial;
            background: none;
            -webkit-background-clip: initial;
            background-clip: initial;
            font-size: 3.8rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .view-toggle, .month-selector {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.6rem;
            border-radius: 30px;
            display: flex;
            align-items: center;
        }

        .view-btn {
            padding: 0.6rem 1.5rem;
            background: transparent;
            border: none;
            border-radius: 25px;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .view-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .view-btn.active {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .month-selector select {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1rem;
            padding: 0.4rem 1rem;
            cursor: pointer;
            outline: none;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
        }

        .month-selector select option {
            background: #111;
            color: #fff;
        }

        .month-selector option {
            background: #1a1a2e;
            color: #E6F1FF;
        }

        /* List View */
        .list-view {
            display: grid;
            gap: 1.5rem;
        }

        .list-view.hidden {
            display: none;
        }

        .event-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 2rem;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .event-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(0, 243, 255, 0.4);
            box-shadow: 0 20px 50px rgba(0, 243, 255, 0.15);
        }

        .event-card.expanded {
            border-color: #ffb703;
        }

        .event-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .event-date {
            background: #64FFDA;
            color: #000;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .event-type {
            background: #9457EB;
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .event-title {
            color: #64FFDA;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .event-summary {
            color: rgba(230, 241, 255, 0.9);
            line-height: 1.6;
        }

        .event-details {
            display: none;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 2px solid rgba(100, 255, 218, 0.3);
        }

        .event-details.visible {
            display: block;
        }

        .detail-section {
            margin-bottom: 1rem;
        }

        .detail-label {
            color: #ffb703;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .detail-content {
            color: rgba(230, 241, 255, 0.9);
            line-height: 1.6;
            padding-left: 1rem;
        }

        .visibility-map {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .region {
            background: rgba(100, 255, 218, 0.1);
            padding: 0.5rem;
            border-radius: 5px;
            border-left: 3px solid #64FFDA;
        }

        /* Calendar View */
        .calendar-view {
            display: none;
        }

        .calendar-view.active {
            display: block;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .calendar-header {
            text-align: center;
            padding: 1rem;
            background: #64FFDA;
            color: #000;
            font-weight: bold;
            border-radius: 10px;
        }

        .calendar-day {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1rem;
            min-height: 140px;
            position: relative;
            transition: all 0.3s ease;
        }

        .calendar-day:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .day-number {
            font-weight: bold;
            color: #64FFDA;
            margin-bottom: 0.5rem;
        }

        .calendar-event {
            background: #9457EB;
            padding: 0.25rem 0.5rem;
            border-radius: 5px;
            font-size: 0.75rem;
            margin-bottom: 0.25rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .calendar-event:hover {
            background: #ffb703;
            transform: scale(1.05);
        }

        .empty-day {
            opacity: 0.3;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .calendar-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .controls {
                flex-direction: column;
            }
        }
    </style>
</head>

                description: "The September equinox marks when the Sun crosses the celestial equator moving southward. It signals the start of autumn in the Northern Hemisphere.",
                visibility: {
                    "Global": "Observable worldwide"
                },
                peakTime: "19:05 UTC",
                duration: "Instantaneous event"
            },
            {
                id: 14,
                date: new Date(2026, 4, 17),
                title: "Jupiter at Opposition",
                type: "Planetary Event",
                summary: "Jupiter will be at its closest approach to Earth and fully illuminated by the Sun.",
                description: "Opposition is the best time to view Jupiter through a telescope. The planet will be visible all night and appear at its brightest in the sky.",
                visibility: {
                    "Global": "Visible worldwide throughout the night"
                },
                peakTime: "All night",
                duration: "Best viewing for several weeks around this date"
            },
            {
                id: 15,
                date: new Date(2026, 7, 27),
                title: "Saturn at Opposition",
                type: "Planetary Event",
                summary: "Saturn will be at its closest to Earth with its rings fully visible.",
                description: "This is the best time of the year to observe Saturn and its magnificent ring system through a telescope.",
                visibility: {
                    "Global": "Visible worldwide throughout the night"
                },
                peakTime: "All night",
                duration: "Best viewing for several weeks around this date"
            }
        ];

        let currentView = 'list';
        let filteredEvents = [...eventsData];

        function displayListView() {
            const container = document.getElementById('listView');
            container.innerHTML = filteredEvents.map(event => `
                <div class="event-card" onclick="toggleEventDetails(${event.id})">
                    <div class="event-header">
                        <div class="event-date">📅 ${event.date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</div>
                        <div class="event-type">${event.type}</div>
                    </div>
                    <h3 class="event-title">${event.title}</h3>
                    <p class="event-summary">${event.summary}</p>
                    <div class="event-details" id="details-${event.id}">
                        <div class="detail-section">
                            <div class="detail-label">📖 Description</div>
                            <div class="detail-content">${event.description}</div>
                        </div>
                        <div class="detail-section">
                            <div class="detail-label">⏰ Peak Time</div>
                            <div class="detail-content">${event.peakTime}</div>
                        </div>
                        <div class="detail-section">
                            <div class="detail-label">⌛ Duration</div>
                            <div class="detail-content">${event.duration}</div>
                        </div>
                        <div class="detail-section">
                            <div class="detail-label">🌍 Visibility Regions</div>
                            <div class="visibility-map">
                                ${Object.entries(event.visibility).map(([region, info]) => `
                                    <div class="region">
                                        <strong>${region}:</strong> ${info}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function displayCalendarView() {
            const container = document.getElementById('calendarView');
            const monthSelect = document.getElementById('monthSelect');
            const selectedMonth = monthSelect.value === 'all' ? null : parseInt(monthSelect.value);
            
            if (selectedMonth === null) {
                container.innerHTML = '<p style="text-align: center; padding: 2rem; font-size: 1.2rem;">Please select a specific month to view calendar</p>';
                return;
            }

            const year = 2026;
            const firstDay = new Date(year, selectedMonth, 1);
            const lastDay = new Date(year, selectedMonth + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startingDayOfWeek = firstDay.getDay();

            let calendarHTML = `
                <div class="calendar-grid">
                    <div class="calendar-header">Sun</div>
                    <div class="calendar-header">Mon</div>
                    <div class="calendar-header">Tue</div>
                    <div class="calendar-header">Wed</div>
                    <div class="calendar-header">Thu</div>
                    <div class="calendar-header">Fri</div>
                    <div class="calendar-header">Sat</div>
            `;

            // Empty cells for days before month starts
            for (let i = 0; i < startingDayOfWeek; i++) {
                calendarHTML += '<div class="calendar-day empty-day"></div>';
            }

            // Days of the month
            for (let day = 1; day <= daysInMonth; day++) {
                const dayEvents = filteredEvents.filter(event => 
                    event.date.getDate() === day && 
                    event.date.getMonth() === selectedMonth
                );

                calendarHTML += `
                    <div class="calendar-day">
                        <div class="day-number">${day}</div>
                        ${dayEvents.map(event => `
                            <div class="calendar-event" onclick="showEventModal(${event.id})" title="${event.title}">
                                ${event.title.substring(0, 20)}${event.title.length > 20 ? '...' : ''}
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            calendarHTML += '</div>';
            container.innerHTML = calendarHTML;
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const listView = document.getElementById('listView');
            const calendarView = document.getElementById('calendarView');

            if (view === 'list') {
                listView.classList.remove('hidden');
                calendarView.classList.remove('active');
                displayListView();
            } else {
                listView.classList.add('hidden');
                calendarView.classList.add('active');
                displayCalendarView();
            }
        }

        function filterByMonth() {
            const monthSelect = document.getElementById('monthSelect');
            const selectedMonth = monthSelect.value;

            if (selectedMonth === 'all') {
                filteredEvents = [...eventsData];
            } else {
                const month = parseInt(selectedMonth);
                filteredEvents = eventsData.filter(event => event.date.getMonth() === month);
            }

            if (currentView === 'list') {
                displayListView();
            } else {
                displayCalendarView();
            }
        }

        function toggleEventDetails(eventId) {
            const details = document.getElementById(`details-${eventId}`);
            const card = details.closest('.event-card');
            
            if (details.classList.contains('visible')) {
                details.classList.remove('visible');
                card.classList.remove('expanded');
            } else {
                // Close all other expanded cards
                document.querySelectorAll('.event-details.visible').forEach(el => {
                    el.classList.remove('visible');
                    el.closest('.event-card').classList.remove('expanded');
                });
                details.classList.add('visible');
                card.classList.add('expanded');
            }
        }

        function showEventModal(eventId) {
            const event = eventsData.find(e => e.id === eventId);
            if (event) {
                alert(`${event.title}

${event.description}

Peak Time: ${event.peakTime}
Duration: ${event.duration}`);
            }
        }

        function logout() {
            fetch('/api/logout', { method: 'POST' })
                .then(() => window.location.href = '/');
        }

    /* ====================================================
       REALISTIC SPACE BACKGROUND — Canvas Star Engine
       ==================================================== */
    (function () {
        const canvas = document.getElementById('space-bg');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', () => { resize(); initStars(); });

        const STAR_COLORS = [
            { r: 255, g: 255, b: 255 }, { r: 200, g: 220, b: 255 },
            { r: 180, g: 200, b: 255 }, { r: 255, g: 245, b: 220 },
            { r: 255, g: 220, b: 160 }, { r: 255, g: 180, b: 100 },
            { r: 255, g: 150, b: 120 }
        ];

        const LAYERS = [
            { count: 250, speed: 0.0,  maxR: 0.6 },
            { count: 180, speed: 0.0,  maxR: 1.1 },
            { count: 90,  speed: 0.0,  maxR: 1.8 }
        ];

        let stars = [];
        let shooters = [];
        let nebulae = [];

        function randRange(min, max) { return Math.random() * (max - min) + min; }
        function randInt(min, max) { return Math.floor(randRange(min, max)); }

        function initStars() {
            stars = [];
            const W = canvas.width, H = canvas.height;
            LAYERS.forEach((layer, li) => {
                for (let i = 0; i < layer.count; i++) {
                    const col = STAR_COLORS[randInt(0, STAR_COLORS.length)];
                    stars.push({
                        x: randRange(0, W), y: randRange(0, H),
                        r: randRange(0.15, layer.maxR),
                        baseAlpha: randRange(0.4, 1.0),
                        alpha: 0,
                        twinkleSpeed: randRange(0.003, 0.025),
                        twinkleOffset: randRange(0, Math.PI * 2),
                        color: col, layer: li,
                        glowMult: li === 2 ? randRange(2.5, 5) : (li === 1 ? randRange(1.5, 3) : 1),
                    });
                }
            });
            nebulae = [];
            const nebulaConfigs = [
                { cx: 0.15, cy: 0.50, r: 0.25, col: '188,19,254', a: 0.045 },
                { cx: 0.85, cy: 0.30, r: 0.28, col: '0,180,255', a: 0.040 },
                { cx: 0.50, cy: 0.85, r: 0.20, col: '255,120,20', a: 0.030 },
                { cx: 0.70, cy: 0.10, r: 0.18, col: '80,220,180', a: 0.025 },
            ];
            nebulaConfigs.forEach(n => nebulae.push({
                cx: n.cx * W, cy: n.cy * H,
                r: n.r * Math.max(W, H),
                col: n.col, a: n.a,
            }));
        }

        function spawnShooter() {
            const W = canvas.width, H = canvas.height;
            const angle = randRange(-0.6, -0.2);
            shooters.push({
                x: randRange(0, W), y: randRange(0, H * 0.5),
                len: randRange(60, 180), speed: randRange(6, 14),
                alpha: 1, dx: Math.cos(angle), dy: Math.sin(angle) * 0.5 + 0.5,
                life: 1
            });
        }

        let t = 0;
        let lastShooter = 0;

        function draw(ts) {
            t = ts * 0.001;
            const W = canvas.width, H = canvas.height;
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, W, H);
            nebulae.forEach(n => {
                const grad = ctx.createRadialGradient(n.cx, n.cy, 0, n.cx, n.cy, n.r);
                grad.addColorStop(0, `rgba(${n.col}, ${n.a})`);
                grad.addColorStop(0.5, `rgba(${n.col}, ${n.a * 0.4})`);
                grad.addColorStop(1, `rgba(${n.col}, 0)`);
                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.arc(n.cx, n.cy, n.r, 0, Math.PI * 2); ctx.fill();
            });
            stars.forEach(s => {
                const flicker = 0.5 + 0.5 * Math.sin(t * s.twinkleSpeed * 60 + s.twinkleOffset);
                s.alpha = s.baseAlpha * (0.55 + 0.45 * flicker);
                const r = s.r; const { r: cr, g: cg, b: cb } = s.color;
                if (s.glowMult > 1) {
                    const gVal = Math.max(0, s.alpha - 0.2); const glowR = r * s.glowMult;
                    const grd = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, glowR);
                    grd.addColorStop(0, `rgba(${cr},${cg},${cb},${gVal * 0.6})`);
                    grd.addColorStop(0.4, `rgba(${cr},${cg},${cb},${gVal * 0.15})`);
                    grd.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
                    ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(s.x, s.y, glowR, 0, Math.PI * 2); ctx.fill();
                }
                ctx.globalAlpha = s.alpha; ctx.fillStyle = `rgb(${cr},${cg},${cb})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2); ctx.fill();
                if (s.layer === 2 && s.r > 1.3 && s.alpha > 0.7) {
                    ctx.globalAlpha = s.alpha * 0.3; ctx.strokeStyle = `rgb(${cr},${cg},${cb})`;
                    ctx.lineWidth = 0.5; const sLen = r * 4;
                    ctx.beginPath(); ctx.moveTo(s.x - sLen, s.y); ctx.lineTo(s.x + sLen, s.y);
                    ctx.moveTo(s.x, s.y - sLen); ctx.lineTo(s.x, s.y + sLen); ctx.stroke();
                }
            });
            ctx.globalAlpha = 1;
            if (ts - lastShooter > randRange(1800, 5000)) { spawnShooter(); lastShooter = ts; }
            shooters = shooters.filter(s => s.life > 0);
            shooters.forEach(s => {
                s.life -= 0.015; s.x += s.dx * s.speed; s.y += s.dy * s.speed;
                const tail = ctx.createLinearGradient(s.x - s.dx * s.len, s.y - s.dy * s.len, s.x, s.y);
                tail.addColorStop(0, `rgba(255,255,255,0)`);
                tail.addColorStop(1, `rgba(255,255,255,${s.life * 0.9})`);
                ctx.strokeStyle = tail; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(s.x - s.dx * s.len, s.y - s.dy * s.len); ctx.lineTo(s.x, s.y); ctx.stroke();
            });
            requestAnimationFrame(draw);
        }
        initStars();
        requestAnimationFrame(draw);
    })();

        // Initialize
        window.onload = () => {
            displayListView();
        };
    </script>
</body>
</html>
