<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spaceverse Quiz Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            --accent: var(--neon-blue);
            --success: #28a745;
            --error: #dc3545;
            --text-glow: 0 0 15px rgba(0, 243, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #000;
            color: #fff; 
            min-height: 100vh;
            padding: 80px 2rem 2rem;
            overflow-x: hidden;
            position: relative;
        }

        #space-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0a0a1a 0%, #000000 100%);
        }
        
        .quiz-container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--glass-bg);
            border-radius: 24px;
            padding: 3rem;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            position: relative;
            z-index: 10;
        }
        
        .quiz-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .quiz-header h1 {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(180deg, #ffffff 0%, var(--neon-blue) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
            margin-bottom: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .quiz-bot {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }
        
        .bot-avatar {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            animation: botPulse 3s infinite ease-in-out;
        }
        
        @keyframes botPulse {
            0%, 100% { transform: translateY(0) scale(1); box-shadow: 0 0 20px rgba(0, 243, 255, 0.2); }
            50% { transform: translateY(-10px) scale(1.05); box-shadow: 0 0 40px rgba(0, 243, 255, 0.4); }
        }
        
        .bot-message {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            padding: 1.5rem 2rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            max-width: 500px;
            font-size: 1.1rem;
            line-height: 1.6;
            position: relative;
        }

        .bot-message::before {
            content: '';
            position: absolute;
            left: -10px;
            top: 50%;
            transform: translateY(-50%);
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-right: 10px solid var(--glass-border);
        }

        .planet-selector h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--text);
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }
        
        .planet-selector {
            margin-bottom: 2rem;
        }
        
        .planet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1.2rem;
            margin-top: 1rem;
        }
        
        .planet-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        
        .planet-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        .planet-card:hover::after {
            left: 100%;
        }

        .planet-card:hover {
            transform: translateY(-10px) scale(1.05);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--neon-blue);
            box-shadow: 0 10px 30px rgba(0, 243, 255, 0.2);
        }
        
        .planet-card.selected {
            background: rgba(0, 243, 255, 0.1);
            border-color: var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
        }
        
        .planet-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }
        
        .planet-card div:last-child {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .quiz-section {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .quiz-section.active {
            display: block;
        }
        
        .question-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 3rem;
            margin-bottom: 2.5rem;
            border: 1px solid var(--glass-border);
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.2);
        }
        
        .question-number {
            font-family: 'Inter', sans-serif;
            color: var(--neon-purple);
            font-size: 0.9rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(188, 19, 254, 0.3);
        }
        
        .question-text {
            font-size: 1.4rem;
            margin-bottom: 2rem;
            line-height: 1.6;
            font-weight: 600;
        }
        
        .options {
            display: grid;
            gap: 1.2rem;
        }
        
        .option {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.2rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            font-size: 1.1rem;
            position: relative;
            overflow: hidden;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .option:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--neon-blue);
            transform: translateX(10px);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
        }
        
        .option.selected {
            border-color: var(--neon-blue);
            background: rgba(0, 243, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
        }
        
        .option.correct {
            border-color: var(--success) !important;
            background: rgba(40, 167, 69, 0.1) !important;
            box-shadow: 0 0 30px rgba(40, 167, 69, 0.3) !important;
        }
        
        .option.incorrect {
            border-color: var(--error) !important;
            background: rgba(220, 53, 69, 0.1) !important;
            box-shadow: 0 0 30px rgba(220, 53, 69, 0.3) !important;
        }
        
        .quiz-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2.5rem;
        }
        
        .btn {
            padding: 1.2rem 2.8rem;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            backdrop-filter: blur(5px);
        }

        .btn-primary {
            background: rgba(0, 243, 255, 0.1);
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            border-color: var(--glass-border);
            color: #fff;
        }
        
        .btn:hover:not(:disabled) {
            transform: translateY(-5px);
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.5);
            border-color: transparent;
        }
        
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            filter: grayscale(1);
        }
        
        .progress-bar {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 2.5rem;
            border: 1px solid var(--glass-border);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }
        
        .progress {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-purple) 0%, var(--neon-blue) 100%);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .score-display {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            font-family: 'Orbitron', sans-serif;
            color: var(--text);
            letter-spacing: 1px;
        }
        
        .score-display span {
            color: var(--accent);
            font-weight: bold;
        }

        .results-section {
            display: none;
            text-align: center;
            animation: fadeIn 0.5s ease-in-out;
        }
        
        .results-section.active {
            display: block;
        }
        
        .results-section h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            color: var(--accent);
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
        }

        .final-score {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            color: #fff;
            margin: 2rem 0;
            text-shadow: 0 0 20px var(--accent2);
        }
        
        .score-message {
            font-size: 1.4rem;
            margin-bottom: 2.5rem;
            color: var(--text);
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.3);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 15;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            backdrop-filter: blur(16px);
            overflow: hidden;
            font-size: 0.9em;
        }

        .back-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--accent);
            z-index: -1;
            transform: scaleY(0);
            transform-origin: bottom;
            transition: transform 0.3s ease;
        }
        
        .back-btn:hover {
            color: #000;
            border-color: rgba(0, 243, 255, 0.8);
            box-shadow: 0 5px 15px rgba(0, 243, 255, 0.3);
            transform: translateY(-2px);
        }

        .back-btn:hover::before {
            transform: scaleY(1);
        }
    </style>
</head>
<body>
    <canvas id="space-bg"></canvas>
    <a href="/" class="back-btn">🌑 Back to Home</a>
    
    <div class="quiz-container">
        <div class="quiz-header">
            <h1>🤖 Spaceverse Quiz Bot</h1>
            <div class="quiz-bot">
                <div class="bot-avatar">🤖</div>
                <div class="bot-message">
                    <p id="botMessage">Hello! I'm your space quiz companion. Select a planet to test your knowledge!</p>
                </div>
            </div>
        </div>
        
        <!-- Planet Selection -->
        <div id="planetSelection" class="planet-selector">
            <h2>Choose a Planet to Quiz About:</h2>
            <div class="planet-grid">
                <div class="planet-card" data-planet="sun">
                    <div class="planet-icon">☀️</div>
                    <div>Sun</div>
                </div>
                <div class="planet-card" data-planet="mercury">
                    <div class="planet-icon">☿️</div>
                    <div>Mercury</div>
                </div>
                <div class="planet-card" data-planet="venus">
                    <div class="planet-icon">♀️</div>
                    <div>Venus</div>
                </div>
                <div class="planet-card" data-planet="earth">
                    <div class="planet-icon">🌍</div>
                    <div>Earth</div>
                </div>
                <div class="planet-card" data-planet="mars">
                    <div class="planet-icon">♂️</div>
                    <div>Mars</div>
                </div>
            </div>
            <div class="quiz-controls">
                <div></div>
                <button class="btn btn-primary" id="startQuizBtn" disabled>Start Quiz</button>
            </div>
        </div>
        
        <!-- Quiz Section -->
        <div id="quizSection" class="quiz-section">
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
            <div class="score-display">
                Score: <span id="currentScore">0</span> / <span id="totalQuestions">0</span>
            </div>
            
            <div id="questionCard" class="question-card">
                <div class="question-number" id="questionNumber"></div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="optionsContainer"></div>
            </div>
            
            <div class="quiz-controls">
                <button class="btn btn-secondary" id="prevBtn">Previous</button>
                <button class="btn btn-primary" id="nextBtn" disabled>Next</button>
            </div>
        </div>
        
        <!-- Results Section -->
        <div id="resultsSection" class="results-section">
            <h2>Quiz Complete! 🎉</h2>
            <div class="final-score" id="finalScore"></div>
            <div class="score-message" id="scoreMessage"></div>
            <div id="wrongAnswersContainer" style="margin-top: 1.5rem; text-align: left; max-height: 40vh; overflow-y: auto;">
                <!-- Wrong questions will be injected here -->
            </div>
            <div class="quiz-controls">
                <button class="btn btn-secondary" onclick="restartQuiz()">Take Another Quiz</button>
                <a href="/solar-system" id="exploreLinkQuiz" class="btn btn-primary">Explore Solar System</a>
            </div>
        </div>
    </div>

    <script>
        // Update explore link depending on authentication
        fetch('/api/user').then(r => r.json()).then(data => {
            const explore = document.getElementById('exploreLinkQuiz');
            if (!explore) return;
            if (data && data.loggedIn) {
                explore.href = '/solar-system';
            } else {
                explore.href = '#';
                explore.addEventListener('click', (e) => {
                    e.preventDefault();
                    alert('Please login to explore the Solar System.');
                });
            }
        }).catch(() => {});
        let currentPlanet = null;
        let questions = [];
        let currentQuestionIndex = 0;
        let userAnswers = [];
        let score = 0;

        // Planet selection
        document.querySelectorAll('.planet-card').forEach(card => {
            card.addEventListener('click', function() {
                document.querySelectorAll('.planet-card').forEach(c => c.classList.remove('selected'));
                this.classList.add('selected');
                currentPlanet = this.dataset.planet;
                document.getElementById('startQuizBtn').disabled = false;
                
                const planetName = this.textContent.trim();
                document.getElementById('botMessage').textContent = `Great choice! Ready to test your knowledge about ${planetName}?`;
            });
        });

        // Start quiz
        document.getElementById('startQuizBtn').addEventListener('click', async function() {
            if (!currentPlanet) return;
            
            try {
                const response = await fetch(`/api/planets/${currentPlanet}/quiz`);
                const data = await response.json();
                
                if (data.questions && data.questions.length > 0) {
                    questions = data.questions;
                    userAnswers = new Array(questions.length).fill(null);
                    startQuiz();
                } else {
                    alert('No quiz questions available for this planet yet!');
                }
            } catch (error) {
                alert('Failed to load quiz questions. Please try again.');
            }
        });

        function startQuiz() {
            document.getElementById('planetSelection').style.display = 'none';
            document.getElementById('quizSection').classList.add('active');
            document.getElementById('totalQuestions').textContent = questions.length;
            document.getElementById('botMessage').textContent = "Let's test your space knowledge! Take your time and think carefully.";
            
            currentQuestionIndex = 0;
            score = 0;
            // clear any previous wrong-answers display
            const wrongContainer = document.getElementById('wrongAnswersContainer');
            if (wrongContainer) wrongContainer.innerHTML = '';
            showQuestion();
        }

        function showQuestion() {
            const question = questions[currentQuestionIndex];
            
            document.getElementById('questionNumber').textContent = `Question ${currentQuestionIndex + 1} of ${questions.length}`;
            document.getElementById('questionText').textContent = question.question;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const optionElement = document.createElement('div');
                optionElement.className = 'option';
                optionElement.textContent = option;
                optionElement.addEventListener('click', () => selectOption(index));
                
                if (userAnswers[currentQuestionIndex] === index) {
                    optionElement.classList.add('selected');
                }
                
                optionsContainer.appendChild(optionElement);
            });
            
            updateProgress();
            updateNavigationButtons();
        }

        function selectOption(optionIndex) {
            userAnswers[currentQuestionIndex] = optionIndex;
            
            document.querySelectorAll('.option').forEach((option, index) => {
                option.classList.remove('selected');
                if (index === optionIndex) {
                    option.classList.add('selected');
                }
            });
            
            document.getElementById('nextBtn').disabled = false;
        }

        function updateProgress() {
            const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function updateNavigationButtons() {
            document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
            document.getElementById('nextBtn').disabled = userAnswers[currentQuestionIndex] === null;
            
            if (currentQuestionIndex === questions.length - 1) {
                document.getElementById('nextBtn').textContent = 'Finish Quiz';
            } else {
                document.getElementById('nextBtn').textContent = 'Next';
            }
        }

        // Navigation
        document.getElementById('prevBtn').addEventListener('click', function() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                showQuestion();
            }
        });

        document.getElementById('nextBtn').addEventListener('click', function() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                showQuestion();
            } else {
                finishQuiz();
            }
        });

        async function finishQuiz() {
            // Calculate score
            score = 0;
            questions.forEach((question, index) => {
                if (userAnswers[index] === question.correctAnswer) {
                    score++;
                }
            });
            
            // Save score to backend
            try {
                await fetch('/api/quiz/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        score: score, 
                        totalQuestions: questions.length,
                        planet: currentPlanet 
                    })
                });
            } catch (error) {
                console.log('Could not save score (user might not be logged in)');
            }
            
            showResults();
        }

        function showResults() {
            document.getElementById('quizSection').classList.remove('active');
            document.getElementById('resultsSection').classList.add('active');
            
            const percentage = Math.round((score / questions.length) * 100);
            document.getElementById('finalScore').textContent = `${score}/${questions.length} (${percentage}%)`;
            
            let message = '';
            if (percentage >= 90) {
                message = "Outstanding! You're a true space expert! 🌟";
            } else if (percentage >= 70) {
                message = "Great job! You know your space facts well! 🚀";
            } else if (percentage >= 50) {
                message = "Good effort! Keep exploring to learn more! 🌙";
            } else {
                message = "Keep studying the cosmos! There's so much to discover! 🔭";
            }
            
            document.getElementById('scoreMessage').textContent = message;
            document.getElementById('botMessage').textContent = `Quiz complete! You scored ${score} out of ${questions.length}. ${message}`;

            // Show wrong questions details
            const wrongContainer = document.getElementById('wrongAnswersContainer');
            wrongContainer.innerHTML = '';
            const wrongIndices = [];
            questions.forEach((q, i) => { if (userAnswers[i] !== q.correctAnswer) wrongIndices.push(i); });

            if (wrongIndices.length === 0) {
                wrongContainer.innerHTML = '<div style="color:#28a745; font-weight:600; margin-top:10px;">All answers correct — well done!</div>';
            } else {
                const heading = document.createElement('div');
                heading.style.fontWeight = '700';
                heading.style.color = '#ffb703';
                heading.style.marginBottom = '10px';
                heading.textContent = `Questions answered incorrectly (${wrongIndices.length}):`;
                wrongContainer.appendChild(heading);

                wrongIndices.forEach(idx => {
                    const q = questions[idx];
                    const userAns = userAnswers[idx];

                    const card = document.createElement('div');
                    card.style.background = 'rgba(255,255,255,0.04)';
                    card.style.border = '1px solid rgba(255,183,3,0.12)';
                    card.style.padding = '10px';
                    card.style.borderRadius = '8px';
                    card.style.marginBottom = '8px';

                    const qText = document.createElement('div');
                    qText.style.marginBottom = '8px';
                    qText.style.fontWeight = '600';
                    qText.textContent = `Q${idx+1}: ${q.question}`;
                    card.appendChild(qText);

                    q.options.forEach((opt, oi) => {
                        const optDiv = document.createElement('div');
                        optDiv.textContent = opt;
                        optDiv.style.padding = '6px 8px';
                        optDiv.style.borderRadius = '6px';
                        optDiv.style.marginBottom = '4px';
                        if (oi === q.correctAnswer) {
                            optDiv.style.background = 'rgba(40,167,69,0.12)';
                            optDiv.style.borderLeft = '4px solid #28a745';
                            optDiv.style.fontWeight = '700';
                        } else if (oi === userAns) {
                            optDiv.style.background = 'rgba(220,53,69,0.08)';
                            optDiv.style.borderLeft = '4px solid #dc3545';
                        } else {
                            optDiv.style.opacity = '0.85';
                        }
                        card.appendChild(optDiv);
                    });

                    wrongContainer.appendChild(card);
                });
            }
        }

        function restartQuiz() {
            document.getElementById('resultsSection').classList.remove('active');
            document.getElementById('planetSelection').style.display = 'block';
            document.getElementById('quizSection').classList.remove('active');
            
            // Reset state
            currentPlanet = null;
            questions = [];
            currentQuestionIndex = 0;
            userAnswers = [];
            score = 0;

            // clear wrong answers UI
            const wrongContainer = document.getElementById('wrongAnswersContainer');
            if (wrongContainer) wrongContainer.innerHTML = '';
            
            document.querySelectorAll('.planet-card').forEach(c => c.classList.remove('selected'));
            document.getElementById('startQuizBtn').disabled = true;
            document.getElementById('botMessage').textContent = "Ready for another challenge? Select a planet to quiz about!";
        }
    </script>
    <script>
        // Updated Star Engine for realistic space background
        (function() {
            const canvas = document.getElementById('space-bg');
            const ctx = canvas.getContext('2d');
            let width, height, stars = [];
            
            const starCount = 600;
            const colors = ['#ffffff', '#e0e0ff', '#fff0f0', '#f0faff', '#00f3ff'];
            
            function init() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                stars = [];
                for(let i = 0; i < starCount; i++) {
                    stars.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        size: Math.random() * 1.5 + 0.2,
                        speed: Math.random() * 0.05 + 0.01,
                        opacity: Math.random(),
                        color: colors[Math.floor(Math.random() * colors.length)],
                        twinkle: Math.random() * 0.02
                    });
                }
            }
            
            function draw() {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, width, height);
                
                // Add nebula glow
                const grad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width);
                grad.addColorStop(0, '#0a0a20');
                grad.addColorStop(1, '#000');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, width, height);
                
                stars.forEach(star => {
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fillStyle = star.color;
                    ctx.globalAlpha = star.opacity;
                    ctx.fill();
                    
                    star.y -= star.speed;
                    if(star.y < 0) star.y = height;
                    
                    star.opacity += star.twinkle;
                    if(star.opacity > 1 || star.opacity < 0.2) star.twinkle *= -1;
                });
                
                requestAnimationFrame(draw);
            }
            
            window.addEventListener('resize', init);
            init();
            draw();
        })();
    </script>
