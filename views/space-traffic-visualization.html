<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Traffic Visualization - SpaceVerse</title>
    <style>
        :root{
            --bg: #060a1a;
            --text: #e8ecf4;
            --gold: #ffd700;
            --blue: #00b4d8;
            --glass: rgba(6,10,26,0.55);
            --glass-border: rgba(255,215,0,0.08);
            --muted: rgba(232,236,244,0.06);
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg);
            color: var(--text);
        }
        canvas { display: block; }
        
        /* ── CINEMATIC LOADER ── */
        #loader-container { 
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            transition: opacity .6s ease;
        }
        #loader-container.hidden { opacity: 0; pointer-events: none; }
        .ld-logo{
            font-size:2.2rem;font-weight:900;letter-spacing:.4em;
            background:linear-gradient(90deg,#fff 0%,var(--gold) 60%);
            -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
            margin-bottom:28px;
        }
        .ld-bar{width:260px;height:3px;background:rgba(255,215,0,0.12);border-radius:4px;overflow:hidden;margin-bottom:14px;}
        #progress{height:100%;width:0%;background:linear-gradient(90deg,var(--gold),#ffaa00);border-radius:4px;transition:width .2s;}
        .loader-text{font-size:.7rem;letter-spacing:.3em;color:rgba(255,215,0,.45);font-weight:600;}

        /* ── MUSIC PLAYER ── */
        #music-player{position:fixed;bottom:80px;right:22px;z-index:100;display:flex;align-items:center;gap:10px;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:40px;padding:8px 14px 8px 10px;transition:all .3s;}
        #music-player:hover{border-color:rgba(255,215,0,.25);box-shadow:0 4px 24px rgba(255,215,0,.08);}
        #mus-btn{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#ffaa00);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;transition:transform .2s,box-shadow .2s;}
        #mus-btn:hover{transform:scale(1.1);box-shadow:0 0 16px rgba(255,215,0,.4);}
        #mus-btn.playing{animation:pulse-gold 2s ease-in-out infinite;}
        @keyframes pulse-gold{0%,100%{box-shadow:0 0 8px rgba(255,215,0,.3)}50%{box-shadow:0 0 20px rgba(255,215,0,.7)}}
        .mus-info{display:flex;flex-direction:column;gap:1px;}
        .mus-title{font-size:.68rem;font-weight:700;color:var(--gold);letter-spacing:.5px;white-space:nowrap;}
        .mus-artist{font-size:.6rem;color:rgba(232,236,244,.4);}
        #mus-vol{width:55px;accent-color:var(--gold);height:3px;cursor:pointer;}
        #mus-eq{display:flex;align-items:flex-end;gap:2px;height:14px;opacity:0;transition:opacity .3s;}
        #mus-eq.active{opacity:1;}
        .eq-bar{width:3px;background:var(--gold);border-radius:2px;}
        #mus-eq.active .eq-bar:nth-child(1){animation:eq .6s .0s ease-in-out infinite alternate;}
        #mus-eq.active .eq-bar:nth-child(2){animation:eq .6s .15s ease-in-out infinite alternate;}
        #mus-eq.active .eq-bar:nth-child(3){animation:eq .6s .1s ease-in-out infinite alternate;}
        #mus-eq.active .eq-bar:nth-child(4){animation:eq .6s .05s ease-in-out infinite alternate;}
        @keyframes eq{from{height:3px}to{height:13px}}
        
        #info-panel { 
            position: absolute; 
            top: 20px; 
            left: -450px; 
            width: 330px; 
            max-height: calc(100vh - 40px); 
            background: var(--glass);
            border-radius: 16px; 
            padding: 24px; 
            box-shadow: 0 8px 32px rgba(0,0,0,.4);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border);
            transition: left 0.5s cubic-bezier(.4,0,.2,1); 
            overflow-y: auto; 
            z-index: 10; 
        }
        #info-panel.visible { left: 20px; }
        #info-panel h2 { 
            margin-top: 0; 
            color: var(--gold); 
            font-size: 1.6em; 
            letter-spacing:.05em;
        }
        #info-panel p { line-height: 1.6; font-size: 0.95em; color: var(--text); }
        #close-btn { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            background: none; 
            border: none; 
            color: var(--text);
            font-size: 24px; 
            cursor: pointer; 
            transition: transform 0.2s; 
        }
        #close-btn:hover { transform: scale(1.2); color: var(--gold); }
        
        .info-item { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 12px; 
            border-bottom: 1px solid rgba(230,241,255,0.03); 
            padding-bottom: 8px; 
            color: #E6F1FF;
        }
        .info-item span:first-child { font-weight: bold; color: #64FFDA; }
        
        #navigation-bar { 
            position: absolute; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: var(--glass);
            border-radius: 40px; 
            padding: 10px 20px; 
            box-shadow: 0 4px 24px rgba(0,0,0,.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            display: flex; 
            gap: 8px; 
            z-index: 10; 
            align-items: center;
            justify-content: center;
            flex-wrap: nowrap;
            overflow-x: auto;
            overscroll-behavior-x: contain;
            max-width: 90vw;
        }
        
        .nav-btn { 
            background: transparent; 
            border: 1px solid transparent;
            color: rgba(232,236,244,.65);
            padding: 8px 14px; 
            border-radius: 24px; 
            cursor: pointer; 
            font-size: .85em; 
            transition: all 0.2s ease; 
            white-space: nowrap;
            font-weight: 600;
            display:flex;align-items:center;gap:6px;
        }
        .nav-btn .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
        .nav-btn:hover { 
            color: var(--gold);
            border-color: rgba(255,215,0,.2);
            background: rgba(255,215,0,.04);
        }
        .nav-btn.active { 
            color: var(--gold);
            border-color: rgba(255,215,0,.4);
            background: rgba(255,215,0,.08);
            box-shadow: 0 0 16px rgba(255,215,0,.12);
        }
        
        #panel-planet-img { 
            display: block; 
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
            object-fit: cover; 
            margin: 0 auto 20px auto; 
            box-shadow: 0 0 15px rgba(100, 255, 218, 0.5); 
            background-color: #000; 
        }
        
        .controls-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--glass);
            border-radius: 16px;
            padding: 18px;
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            z-index:10;
            min-width:190px;
        }
        .control-group {
            margin-bottom: 14px;
        }
        .control-group label {
            display: block;
            color: var(--gold);
            margin-bottom: 5px;
            font-size: 0.8em;
            letter-spacing:.03em;
        }
        .control-group input[type="range"] {
            width: 100%;
            accent-color: var(--gold);
            margin-bottom: 5px;
        }
        .control-group button {
            width: 100%;
            padding: 8px;
            background: rgba(255,215,0,.06);
            border: 1px solid rgba(255,215,0,.25);
            color: var(--gold);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size:.8rem;
            font-family:inherit;
        }
        .control-group button:hover {
            background: rgba(255,215,0,.14);
        }
        
        .help-tooltip {
            position: fixed;
            top: 20px;
            right: 260px;
            background: rgba(0, 5, 20, 0.95);
            border: 1px solid #64FFDA(8, 64, 84, 0.3);
            border-radius: 12px;
            padding: 10px 15px;
            color: #fff;
            font-size: 0.85em;
            letter-spacing: 0.2px;
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            z-index: 1000;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            transition: all 0.5s ease;
            white-space: nowrap;
            transform-origin: top right;
            opacity: 0;
            transform: translateY(-10px);
        }
        
        .help-tooltip .shortcut {
            color: #64FFDA;
            font-weight: 600;
            text-shadow: 0 0 8px rgba(100,255,218,0.18);
        }
        
        .help-tooltip.fade {
            opacity: 0;
            transform: translateY(-5px);
            pointer-events: none;
        }
        
        .help-tooltip:hover {
            opacity: 1;
            transform: none;
            pointer-events: auto;
        }
        
        @media (max-width: 1024px) {
            .help-tooltip {
                top: auto;
                bottom: 180px;
                right: 20px;
                transform-origin: bottom right;
                transform: translateY(10px);
            }
            .help-tooltip.fade {
                opacity: 0;
                transform: translateY(10px);
                pointer-events: none;
            }
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,215,0,.06);
            border: 1px solid rgba(255,215,0,.25);
            color: var(--gold);
            padding: 8px 18px;
            border-radius: 25px;
            text-decoration: none;
            transition: all 0.3s;
            z-index: 15;
            font-size:.82rem;font-weight:600;
        }
        .back-btn:hover {
            background: rgba(255,215,0,.14);
            transform: translateY(-2px);
        }
        
        .quiz-btn {
            background: rgba(100, 255, 218, 0.06);
            border: 2px solid #64FFDA;
            color: #E6F1FF;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            width: 100%;
        }
        
        .quiz-btn:hover {
            background: rgba(148,87,235,0.12);
            transform: translateY(-2px);
            color: #64FFDA;
        }
        
        .facts-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(100,255,218,0.08);
        }
        
        .fact-item {
            background: rgba(100, 255, 218, 0.04);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #64FFDA;
            font-size: 0.9em;
            color: #E6F1FF;
        }

        /* Visual layers */
        #starfield-layer, #vignette-layer, #lensflare {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 5;
        }

        /* Starfield: generate stars via CSS radial gradients for perf and parallax */
        #starfield-layer {
            background-image: radial-gradient(rgba(230,241,255,0.9) 0.6px, transparent 0.7px),
                              radial-gradient(rgba(148,87,235,0.8) 1px, transparent 1.2px),
                              radial-gradient(rgba(100,255,218,0.75) 0.7px, transparent 0.9px);
            background-size: 1200px 1200px, 2000px 2000px, 800px 800px;
            opacity: 0.7;
            mix-blend-mode: screen;
            transform: translateZ(0);
        }

        /* vignette */
        #vignette-layer {
            background: radial-gradient(ellipse at center, rgba(0,0,0,0) 50%, rgba(0,0,0,0.5) 100%);
            opacity: 0.6;
            mix-blend-mode: multiply;
        }

        /* lensflare sprite - positioned via JS */
        #lensflare {
            background-image: radial-gradient(circle at 30% 30%, rgba(100,255,218,0.35), rgba(100,255,218,0.08) 25%, transparent 40%),
                              radial-gradient(circle at 70% 70%, rgba(148,87,235,0.18), transparent 35%);
            background-repeat: no-repeat;
            background-size: 200px 200px;
            opacity: 0.0; /* toggled by JS */
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 6;
        }

        /* planet selection pop */
        .planet-pop {
            animation: popSelect 300ms cubic-bezier(.2,.8,.2,1);
        }
        @keyframes popSelect {
            0% { transform: scale(0.85); filter: drop-shadow(0 0 0 rgba(100,255,218,0)); }
            60% { transform: scale(1.08); filter: drop-shadow(0 10px 30px rgba(100,255,218,0.12)); }
            100% { transform: scale(1); filter: drop-shadow(0 6px 18px rgba(100,255,218,0.08)); }
        }

        @media (max-width: 768px) {
            .controls-panel {
                position: fixed;
                top: auto;
                bottom: 100px;
                right: 10px;
                left: 10px;
                width: auto;
            }

            #navigation-bar {
                bottom: 10px;
                left: 10px;
                right: 10px;
                transform: none;
                max-width: none;
            }

            #info-panel {
                width: calc(100vw - 40px);
                left: -100vw;
            }

            #info-panel.visible {
                left: 20px;
            }
        }
        
        /* Space Traffic Visualization Controls */
        .traffic-controls {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(13,17,23,0.85);
            border-radius: 15px;
            padding: 15px;
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(100,255,218,0.06);
            z-index: 10;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .traffic-control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .traffic-control-group label {
            color: #64FFDA;
            font-size: 0.8em;
            text-align: center;
        }
        
        .traffic-btn {
            padding: 6px 12px;
            background: rgba(255,215,0,.06);
            border: 1px solid rgba(255,215,0,.2);
            color: var(--text);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.82em;
        }
        .traffic-btn:hover {
            background: rgba(255,215,0,.12);
        }
        .traffic-btn.active {
            background: rgba(255,215,0,.15);
            border-color: var(--gold);
            color: var(--gold);
        }
        
        /* Heatmap legend */
        .heatmap-legend {
            position: absolute;
            bottom: 80px;
            right: 20px;
            background: rgba(13,17,23,0.85);
            border-radius: 15px;
            padding: 15px;
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(100,255,218,0.06);
            z-index: 10;
            width: 200px;
        }
        
        .legend-title {
            color: #64FFDA;
            text-align: center;
            margin-bottom: 10px;
            font-size: 0.9em;
        }
        
        .legend-gradient {
            height: 20px;
            background: linear-gradient(to right, green, yellow, red);
            border-radius: 10px;
            margin-bottom: 5px;
        }
        
        .legend-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <a href="/space-traffic-simulator" class="back-btn">← Back to Simulator</a>
    
    <div class="help-tooltip" id="controlsHelp">
        <span class="shortcut">Left-drag</span>: rotate |
        <span class="shortcut">Right/Shift+drag</span>: pan |
        <span class="shortcut">Scroll</span>: zoom
    </div>
    
    <div id="loader-container">
        <div class="ld-logo">SPACEVERSE</div>
        <div class="ld-bar"><div id="progress"></div></div>
        <div class="loader-text">LOADING TRAFFIC SIMULATION</div>
    </div>
    
    <div class="controls-panel">
        <div class="control-group">
            <label for="speedControl">Animation Speed</label>
            <input type="range" id="speedControl" min="0" max="5" step="0.1" value="1" 
                   aria-label="Animation Speed Control" title="Adjust animation speed from 0 to 5x">
        </div>
        <div class="control-group">
            <label for="zoomControl">Camera Distance</label>
            <input type="range" id="zoomControl" min="50" max="800" value="200"
                   aria-label="Camera Distance Control" title="Adjust camera distance from 50 to 800 units">
        </div>
        <div class="control-group">
            <label for="realTimeToggle">Real-time alignment (approx)</label>
            <input type="checkbox" id="realTimeToggle" title="Use approximate real-time orbital positions based on J2000 epoch and orbital periods">
        </div>
        
        <div class="control-group">
            <button id="pauseBtn">Pause Animation</button>
        </div>
        <div class="control-group">
            <button id="resetViewBtn">Reset View</button>
        </div>
        <div class="control-group">
            <button onclick="window.location.href='/quiz'">🧠 Take Quiz</button>
        </div>
        <div class="control-group">
            <label for="parallaxToggle">UI Parallax (stars & chrome)</label>
            <input type="checkbox" id="parallaxToggle" checked>
        </div>
        <div class="control-group">
            <label for="lensflareToggle">Sun Lens Flare</label>
            <input type="checkbox" id="lensflareToggle" checked>
        </div>
    </div>
    
    <div class="traffic-controls">
        <div class="traffic-control-group">
            <label>Show Traffic</label>
            <button class="traffic-btn active" id="showTrafficBtn">On</button>
        </div>
        <div class="traffic-control-group">
            <label>Heatmap</label>
            <button class="traffic-btn" id="heatmapBtn">Off</button>
        </div>
        <div class="traffic-control-group">
            <label>Debris</label>
            <button class="traffic-btn" id="debrisBtn">Off</button>
        </div>
    </div>
    
    <div class="heatmap-legend" id="heatmapLegend" style="display: none;">
        <div class="legend-title">Congestion Level</div>
        <div class="legend-gradient"></div>
        <div class="legend-labels">
            <span>Low</span>
            <span>Medium</span>
            <span>High</span>
        </div>
    </div>
    
    <div id="info-panel">
        <button id="close-btn">&times;</button>
        <img src="" alt="Selected Object" id="panel-planet-img">
        <h2 id="object-name"></h2>
        <div id="object-info"></div>
        <div class="facts-section" id="factsSection"></div>
    </div>

    <div id="navigation-bar"></div>

    <!-- Music Player -->
    <div id="music-player">
        <button id="mus-btn" title="Play / Pause">▶</button>
        <div class="mus-info">
            <div class="mus-title">Cornfield Chase</div>
            <div class="mus-artist">Hans Zimmer · Interstellar</div>
        </div>
        <input id="mus-vol" type="range" min="0" max="1" step=".01" value="0.5" title="Volume">
        <div id="mus-eq"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>
    </div>

    <!-- Visual layers -->
    <div id="starfield-layer" aria-hidden="true"></div>
    <div id="vignette-layer" aria-hidden="true"></div>
    <div id="lensflare" aria-hidden="true"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Scene setup
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // Loading manager
            const loadingManager = new THREE.LoadingManager();
            const loaderContainer = document.getElementById('loader-container');
            const progressElement = document.getElementById('progress');
            loadingManager.onProgress = (url, itemsLoaded, itemsTotal) => {
                progressElement.style.width = (itemsLoaded / itemsTotal * 100) + '%';
            };
            
            loadingManager.onLoad = () => {
                setTimeout(() => {
                    loaderContainer.classList.add('hidden');
                    
                    // Show help tooltip after loading screen is gone
                    const helpTooltip = document.getElementById('controlsHelp');
                    helpTooltip.style.opacity = '1';
                    helpTooltip.style.transform = 'none';
                    
                    // Fade help tooltip after delay
                    setTimeout(() => helpTooltip.classList.add('fade'), 8000);
                }, 500);
            };

            const textureLoader = new THREE.TextureLoader(loadingManager);
            const gltfLoader = new THREE.GLTFLoader(loadingManager);

            // Mapping from planet key to GLB model path
            const planetModelMap = {
                sun: '/models/the_star_sun.glb',
                mercury: '/models/mercury_planet.glb',
                venus: '/models/planet_venus.glb',
                earth: '/models/Earth_1_12756.glb',
                mars: '/models/mars.glb',
                jupiter: '/models/jupiter.glb',
                saturn: '/models/saturn.glb',
                uranus: '/models/realistic_uranus_4k.glb',
                neptune: '/models/neptune.glb'
            };
            
            // Enhanced lighting
            // Brighter ambient and sun light for visibility
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            
            const sunLight = new THREE.PointLight(0xfff8e8, 1.8, 5000);
            sunLight.position.set(0, 0, 0);
            sunLight.castShadow = false;  // No shadow maps — avoids banding artifacts
            scene.add(sunLight);
            const fillLight = new THREE.DirectionalLight(0x334466, 0.3);
            fillLight.position.set(-200, 80, -200); scene.add(fillLight);
            renderer.shadowMap.enabled = false;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 0.72;

            // Starfield
            const starGeometry = new THREE.BufferGeometry();
            const starVertices = [];
            for (let i = 0; i < 20000; i++) {
                const x = (Math.random() - 0.5) * 4000;
                const y = (Math.random() - 0.5) * 4000;
                const z = (Math.random() - 0.5) * 4000;
                starVertices.push(x, y, z);
            }
            starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
            const starMaterial = new THREE.PointsMaterial({ 
                color: 0xffffff, 
                size: Math.random() * 2 + 0.5,
                transparent: true,
                opacity: 0.8
            });
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);

            // Variables
            const celestialObjects = new Map();
            const spaceTrafficObjects = []; // For satellites and debris
            const navigationBar = document.getElementById('navigation-bar');
            let animationSpeed = 1;

            const SFX=(()=>{
                let ctx=null;
                function gc(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();return ctx;}
                function play(opts={}){
                    try{
                        const c=gc(),osc=c.createOscillator(),g=c.createGain();
                        osc.connect(g);g.connect(c.destination);
                        osc.type=opts.wave||'sine';
                        osc.frequency.setValueAtTime(opts.freq||440,c.currentTime);
                        if(opts.sweep)osc.frequency.exponentialRampToValueAtTime(opts.sweep,c.currentTime+(opts.dur||0.15));
                        g.gain.setValueAtTime(opts.vol||0.1,c.currentTime);
                        g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+(opts.dur||0.15));
                        osc.start(c.currentTime);osc.stop(c.currentTime+(opts.dur||0.15)+0.01);
                    }catch(e){}
                }
                return {
                    click:()=>play({freq:660,sweep:880,dur:.1,vol:.07}),
                    select:()=>play({freq:440,sweep:660,dur:.18,vol:.09}),
                    zoom:()=>play({wave:'triangle',freq:220,sweep:180,dur:.22,vol:.05}),
                    resume:()=>{try{if(ctx&&ctx.state==='suspended')ctx.resume();}catch(e){}}

            // ── PLANET GLOW SPRITES ──
            const PLANET_COLORS = {

                mars:'#ef5350', jupiter:'#e0a96d', saturn:'#f4d06f', uranus:'#7fffd4', neptune:'#5c7cfa'
            };
            function hexToRgb(hex){
                if(hex.length===4)hex='#'+hex[1]+hex[1]+hex[2]+hex[2]+hex[3]+hex[3];
                const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
                return `rgb(${r},${g},${b})`;
            }
            function makeGlowCanvas(color){
                const sz=128,c=document.createElement('canvas');c.width=sz;c.height=sz;
                const ctx=c.getContext('2d'),g=ctx.createRadialGradient(sz/2,sz/2,0,sz/2,sz/2,sz/2);
                g.addColorStop(0,color.replace(')' ,',0.55)').replace('rgb','rgba'));
                g.addColorStop(0.4,color.replace(')' ,',0.18)').replace('rgb','rgba'));
                g.addColorStop(1,'rgba(0,0,0,0)');
                ctx.fillStyle=g;ctx.fillRect(0,0,sz,sz);return c;
            }
            function addGlow(group, key, dist, pivot){
                try{
                    const col=hexToRgb(PLANET_COLORS[key]||'#8888ff');
                    const tex=new THREE.CanvasTexture(makeGlowCanvas(col));
                    const size=key==='sun'?60:Math.max(4,(group.userData?.radius||1)*3.5);
                    const mat=new THREE.SpriteMaterial({map:tex,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:key==='sun'?.45:.55});
                    const sprite=new THREE.Sprite(mat);sprite.scale.set(size,size,1);
                    sprite.position.x=dist;pivot.add(sprite);
                }catch(e){console.warn('Glow fail:',key,e);}
            }

            function buildScene(planetArray) {
                planetArray.forEach(data => {
                    const key = data.key;

                    // Create orbital path
                    let orbit;
                    if (data.distance) {
                        const orbitGeometry = new THREE.RingGeometry(data.distance - 0.2, data.distance + 0.2, 256);
                        const orbitMaterial = new THREE.MeshBasicMaterial({ 
                            color: 0xffffff, 
                            side: THREE.DoubleSide, 
                            transparent: true, 
                            opacity: 0.1 
                        });
                        orbit = new THREE.Mesh(orbitGeometry, orbitMaterial);
                        orbit.rotation.x = Math.PI / 2;
                        scene.add(orbit);
                    }

                    // Create pivot for orbital motion
                    const pivot = new THREE.Object3D();
                    scene.add(pivot);

                    const modelUrl = planetModelMap[key];
                    if (modelUrl) {
                        gltfLoader.load(modelUrl, (gltf) => {
                            const group = new THREE.Group();
                            group.add(gltf.scene);
                            group.updateMatrixWorld(true);

                            // Scale model to match target radius
                            const box = new THREE.Box3().setFromObject(group);
                            const size = new THREE.Vector3();
                            box.getSize(size);
                            const modelDiameter = Math.max(size.x, size.y, size.z) || 1;
                            const targetDiameter = (data.radius || 1) * 2;
                            const scaleFactor = targetDiameter / modelDiameter;
                            group.scale.setScalar(scaleFactor);

                            group.traverse(child => {
                                if (child.isMesh) {
                                    child.castShadow = key !== 'sun';
                                    child.receiveShadow = key !== 'sun';
                                    // If this is earth, boost emissive to increase visible brightness
                                    if (key === 'earth') {
                                        if (child.material) {
                                            // Preserve existing emissive if present
                                            if (child.material.emissive) {
                                                child.material.emissive = child.material.emissive.clone();
                                                child.material.emissiveIntensity = Math.max(child.material.emissiveIntensity || 0, 0.8);
                                            } else {
                                                child.material.emissive = new THREE.Color(0x4444ff);
                                                child.material.emissiveIntensity = 0.8;
                                            }
                                            child.material.needsUpdate = true;
                                        }
                                    }
                                }
                            });

                            group.userData = { ...data, key };
                            pivot.add(group);

            // Mouse controls
            let dragMode = null; // 'rotate' or 'pan'
            let panStartWorld = null;

            // Prevent default context menu so right-drag works for panning
            window.addEventListener('contextmenu', (e) => e.preventDefault());

            document.addEventListener('mousedown', e => { 
                isDragging = true; 
                canClick = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };

                // Determine drag mode: left button rotates, right/middle or Shift+left pans
                if (e.button === 0 && !e.shiftKey) {
                    dragMode = 'rotate';
                    document.body.style.cursor = 'grab';
                } else {
                    dragMode = 'pan';
                    document.body.style.cursor = 'grabbing';

                    // initialize pan start world point by intersecting pointer ray with plane at desired target
                    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                    mouse.y = - (e.clientY / window.innerHeight) * 2 + 1;
                    raycaster.setFromCamera(mouse, camera);
                    const camDir = new THREE.Vector3();
                    camera.getWorldDirection(camDir);
                    const plane = new THREE.Plane().setFromNormalAndCoplanarPoint(camDir, desiredCameraTarget.clone());
                    panStartWorld = new THREE.Vector3();
                    raycaster.ray.intersectPlane(plane, panStartWorld);
                }
            });
            
            document.addEventListener('mouseup', () => { isDragging = false; dragMode = null; panStartWorld = null; document.body.style.cursor = ''; });
            
            document.addEventListener('mousemove', e => {
                if (Math.abs(e.clientX - previousMousePosition.x) > 5 || Math.abs(e.clientY - previousMousePosition.y) > 5) {
                    canClick = false;
                }
                if (!isDragging) return;

                const deltaMove = { x: e.clientX - previousMousePosition.x, y: e.clientY - previousMousePosition.y };

                if (dragMode === 'rotate') {
                    // rotate around target
                    desiredCameraTheta -= deltaMove.x * 0.005;
                    desiredCameraPhi -= deltaMove.y * 0.005;
                    desiredCameraPhi = Math.max(0.05, Math.min(Math.PI - 0.05, desiredCameraPhi));
                } else if (dragMode === 'pan') {
                    // pan: compute new intersection and move desiredCameraTarget by the delta in world space
                    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                    mouse.y = - (e.clientY / window.innerHeight) * 2 + 1;
                    raycaster.setFromCamera(mouse, camera);
                    const camDir = new THREE.Vector3();
                    camera.getWorldDirection(camDir);
                    const plane = new THREE.Plane().setFromNormalAndCoplanarPoint(camDir, desiredCameraTarget.clone());
                    const currentWorld = new THREE.Vector3();
                    const hit = raycaster.ray.intersectPlane(plane, currentWorld);
                    if (hit && panStartWorld) {
                        const offset = new THREE.Vector3().subVectors(currentWorld, panStartWorld);
                        // Move desired target opposite to pointer movement to create natural panning
                        desiredCameraTarget.sub(offset);
                        // update panStartWorld for continuous panning
                        panStartWorld.copy(currentWorld);
                    }
                }

                previousMousePosition = { x: e.clientX, y: e.clientY };
            });
            
            // Improved zoom: zoom toward pointer / any point under cursor (not only Sun)
            document.addEventListener('wheel', e => {
                // prevent page scrolling while interacting with canvas
                e.preventDefault();

                // compute zoom amount (scale down delta since browsers report large values)
                const delta = e.deltaY;
                // clamp for stability
                const clamped = Math.max(-300, Math.min(300, delta));

                // Map mouse position into NDC
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = - (e.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);

                // Create a plane that passes through the desired camera target and is perpendicular to camera direction
                const camDir = new THREE.Vector3();
                camera.getWorldDirection(camDir);
                const plane = new THREE.Plane().setFromNormalAndCoplanarPoint(camDir, desiredCameraTarget.clone());

                const intersectPoint = new THREE.Vector3();
                const hasIntersection = raycaster.ray.intersectPlane(plane, intersectPoint);

                // Determine zoom movement magnitude; negative clamped -> zoom in
                const zoomStrength = 0.0009; // tweakable constant
                const moveScalar = -clamped * zoomStrength * Math.max(1, desiredCameraRadius);

                // If we hit something on that plane, move desiredCameraTarget a bit toward that point proportional to zoom
                if (hasIntersection && intersectPoint) {
                    const dirToPoint = new THREE.Vector3().subVectors(intersectPoint, desiredCameraTarget);
                    const distanceToPoint = dirToPoint.length();
                    if (distanceToPoint > 0.0001) {
                        dirToPoint.normalize();
                        // Move desired camera target toward or away from the intersect point depending on wheel direction
                        desiredCameraTarget.add(dirToPoint.multiplyScalar(moveScalar));
                    }
                }

                // Adjust desired radius (dolly) as well
                desiredCameraRadius += clamped * 0.12; // sensible sensitivity
                desiredCameraRadius = Math.max(10, Math.min(2000, desiredCameraRadius));

                // Keep UI control in sync
                const zControl = document.getElementById('zoomControl');
                if (zControl) zControl.value = Math.round(desiredCameraRadius);
            }, { passive: false });

            // Object selection
            const raycaster = new THREE.Raycaster();

                raycaster.setFromCamera(mouse, camera);
                
                // Check for celestial objects first
                const celestialIntersects = raycaster.intersectObjects([...celestialObjects.values()].map(o => o.group || o.mesh), true);
                if (celestialIntersects.length > 0) {
                    handleObjectSelection(celestialIntersects[0].object);
                    return;
                }
                
                // Check for space traffic objects
                const trafficIntersects = raycaster.intersectObjects(spaceTrafficObjects, true);
                if (trafficIntersects.length > 0) {
                    handleTrafficObjectSelection(trafficIntersects[0].object);

            });

            // Parallax pointer handling (UI layers)
            window.addEventListener('pointermove', (e) => {
                if (!parallaxEnabled) return;
                const nx = (e.clientX / window.innerWidth - 0.5) * 2; // -1..1
                const ny = (e.clientY / window.innerHeight - 0.5) * 2;
                // translate starfield subtly opposite to pointer for depth
                const sx = -nx * 20; // pixels
                const sy = -ny * 12;
                if (starfieldLayer) starfieldLayer.style.transform = `translate(${sx}px, ${sy}px)`;

                // slight tilt on controls-panel for parallax
                const controls = document.querySelector('.controls-panel');
                if (controls) controls.style.transform = `translate3d(${nx*6}px, ${-ny*6}px, 0)`;
            });

            // Toggle handlers
            if (parallaxToggle) parallaxToggle.addEventListener('change', (e) => parallaxEnabled = e.target.checked);
            if (overlayToggle) overlayToggle.addEventListener('change', (e) => {
                overlayEnabled = e.target.checked;
                overlayLayer.style.opacity = overlayEnabled ? '0.12' : '0';
            });
            if (lensflareToggle) lensflareToggle.addEventListener('change', (e) => lensflareEnabled = e.target.checked);
            if (soundToggle) soundToggle.addEventListener('change', (e) => soundsEnabled = e.target.checked);


                // Double-click to zoom in strongly to the clicked object
                document.addEventListener('dblclick', (event) => {
                    if (event.target.closest('#navigation-bar, #info-panel, .controls-panel, .traffic-controls')) return;
                    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                    mouse.y = - (event.clientY / window.innerHeight) * 2 + 1;
                    raycaster.setFromCamera(mouse, camera);
                    
                    // Check for celestial objects first
                    const celestialIntersects = raycaster.intersectObjects([...celestialObjects.values()].map(o => o.group || o.mesh), true);
                    if (celestialIntersects.length > 0) {
                        // pass an option to indicate a stronger zoom
                        handleObjectSelection(celestialIntersects[0].object, { strongZoom: true });
                        return;
                    }
                    
                    // Check for space traffic objects
                    const trafficIntersects = raycaster.intersectObjects(spaceTrafficObjects, true);
                    if (trafficIntersects.length > 0) {
                        handleTrafficObjectSelection(trafficIntersects[0].object, { strongZoom: true });
                    }
                });

                // Handler for celestial object selection
                function handleObjectSelection(selectedObject, opts = {}) {
                    let root = selectedObject;
                    while (root && (!root.userData || !root.userData.key)) {
                        root = root.parent;
                    }
                    if (!root) return;
                    const data = root.userData;
                    const key = data.key;

                    // Update info panel
                    document.getElementById('panel-planet-img').src = data.textureUrl || '';
                    document.getElementById('object-name').innerText = data.name || '';
                    document.getElementById('object-info').innerHTML = data.info || '';

                    // Show facts if available
                    const factsSection = document.getElementById('factsSection');
                    factsSection.innerHTML = '';
                    if (data.facts && data.facts.length > 0) {
                        factsSection.innerHTML = '<h3 style="color: #64FFDA; margin-bottom: 10px;">Interesting Facts:</h3>';
                        data.facts.forEach(fact => {
                            const factElement = document.createElement('div');
                            factElement.className = 'fact-item';
                            factElement.textContent = fact;
                            factsSection.appendChild(factElement);
                        });
                        factsSection.style.display = 'block';
                    } else {
                        factsSection.style.display = 'none';
                    }

                    document.getElementById('info-panel').classList.add('visible');

                    // Add visual pop to the selected root (if mesh/group)
                    try {
                        if (root && root.isMesh) {
                            root.classList?.add('planet-pop');
                        } else if (root && root.children) {
                            // apply to first child mesh to show pop
                            const meshChild = root.children.find(c => c.isMesh);
                            if (meshChild) {
                                meshChild.userData.__popTemp = meshChild.userData.__popTemp || 0;
                                meshChild.scale.multiplyScalar(1.02);
                                // use a timeout to revert scale
                                setTimeout(() => meshChild.scale.multiplyScalar(1/1.02), 320);
                            }
                        }
                    } catch(e) { /* ignore if not applicable */ }


                    // Camera animation to selected object (tween desired state)
                    const targetPosition = new THREE.Vector3();
                    root.getWorldPosition(targetPosition);

                    const zoomMultiplier = opts.strongZoom ? 3.5 : 6;
                    const newDesiredRadius = Math.max(10, (data.radius || 1) * zoomMultiplier);
                    const newDesiredPhi = Math.PI / 3;

                    // Tween desiredCameraTarget for a smooth camera target movement
                    new TWEEN.Tween({ x: desiredCameraTarget.x, y: desiredCameraTarget.y, z: desiredCameraTarget.z })
                        .to({ x: targetPosition.x, y: targetPosition.y, z: targetPosition.z }, 900)
                        .easing(TWEEN.Easing.Cubic.Out)
                        .onUpdate(function(v) {
                            desiredCameraTarget.set(v.x, v.y, v.z);
                        })
                        .start();

                    // Tween desired radius and phi
                    new TWEEN.Tween({ r: desiredCameraRadius, p: desiredCameraPhi })
                        .to({ r: newDesiredRadius, p: newDesiredPhi }, 900)
                        .easing(TWEEN.Easing.Cubic.Out)
                        .onUpdate(function(val) {
                            desiredCameraRadius = val.r;
                            desiredCameraPhi = val.p;
                        })
                        .start();

                    // Update UI
                    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
                    const activeBtn = document.querySelector(`.nav-btn[data-key="${key}"]`);
                    if (activeBtn) activeBtn.classList.add('active');

                    // Highlight selected orbit
                    celestialObjects.forEach((obj, objKey) => {
                        if(obj.orbit) {
                            obj.orbit.material.opacity = (objKey === key) ? 0.6 : 0.1;
                            obj.orbit.material.color.set((objKey === key) ? 0x64FFDA : 0xffffff);
                        }
                    });
                }
                
                // Handler for space traffic object selection
                function handleTrafficObjectSelection(selectedObject, opts = {}) {
                    // Update info panel with traffic object info
                    document.getElementById('panel-planet-img').src = ''; // No image for satellites
                    document.getElementById('object-name').innerText = 'Satellite';
                    document.getElementById('object-info').innerHTML = '<p>This is a satellite in Earth orbit.</p>';
                    
                    // Show facts section with satellite info
                    const factsSection = document.getElementById('factsSection');
                    factsSection.innerHTML = '<h3 style="color: #64FFDA; margin-bottom: 10px;">Satellite Information:</h3>';
                    factsSection.innerHTML += `
                        <div class="info-item"><span>Orbit Type:</span> <span>LEO</span></div>
                        <div class="info-item"><span>Altitude:</span> <span>${selectedObject.userData.orbitRadius.toFixed(1)} km</span></div>
                        <div class="info-item"><span>Inclination:</span> <span>${(selectedObject.userData.inclination * 180 / Math.PI).toFixed(1)}°</span></div>
                        <div class="info-item"><span>Status:</span> <span>Operational</span></div>
                    `;
                    factsSection.style.display = 'block';
                    
                    document.getElementById('info-panel').classList.add('visible');
                    
                    // Camera animation to selected object
                    const targetPosition = selectedObject.position.clone();
                    const zoomMultiplier = opts.strongZoom ? 5 : 10;
                    const newDesiredRadius = Math.max(10, zoomMultiplier);
                    const newDesiredPhi = Math.PI / 4;

                    // Tween desiredCameraTarget for a smooth camera target movement
                    new TWEEN.Tween({ x: desiredCameraTarget.x, y: desiredCameraTarget.y, z: desiredCameraTarget.z })
                        .to({ x: targetPosition.x, y: targetPosition.y, z: targetPosition.z }, 900)
                        .easing(TWEEN.Easing.Cubic.Out)
                        .onUpdate(function(v) {
                            desiredCameraTarget.set(v.x, v.y, v.z);
                        })
                        .start();

                    // Tween desired radius and phi
                    new TWEEN.Tween({ r: desiredCameraRadius, p: desiredCameraPhi })
                        .to({ r: newDesiredRadius, p: newDesiredPhi }, 900)
                        .easing(TWEEN.Easing.Cubic.Out)
                        .onUpdate(function(val) {
                            desiredCameraRadius = val.r;
                            desiredCameraPhi = val.p;
                        })
                        .start();
                }
            
            // Close info panel
            document.getElementById('close-btn').addEventListener('click', () => {
                document.getElementById('info-panel').classList.remove('visible');

                // Tween desired state back to overview
                new TWEEN.Tween({ x: desiredCameraTarget.x, y: desiredCameraTarget.y, z: desiredCameraTarget.z })
                    .to({ x: 0, y: 0, z: 0 }, 900)
                    .easing(TWEEN.Easing.Cubic.Out)
                    .onUpdate(function(v) { desiredCameraTarget.set(v.x, v.y, v.z); })
                    .start();

                new TWEEN.Tween({ r: desiredCameraRadius, p: desiredCameraPhi })
                    .to({ r: 200, p: Math.PI / 4 }, 900)
                    .easing(TWEEN.Easing.Cubic.Out)
                    .onUpdate(function(val) { desiredCameraRadius = val.r; desiredCameraPhi = val.p; })
                    .start();

                document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
                celestialObjects.forEach(obj => {
                    if(obj.orbit) {
                        obj.orbit.material.opacity = 0.1;
                        obj.orbit.material.color.set(0xffffff);
                    }
                });
            });

            // Control panel functionality
            document.getElementById('speedControl').addEventListener('input', function() {
                animationSpeed = parseFloat(this.value);
            });
            
            document.getElementById('zoomControl').addEventListener('input', function() {
                desiredCameraRadius = parseFloat(this.value);
            });

            // Real-time alignment toggle (checkbox in control panel)
            const rtToggleEl = document.getElementById('realTimeToggle');
            if (rtToggleEl) {
                rtToggleEl.addEventListener('change', function() {
                    useRealTimeAlignment = !!this.checked;
                    if (useRealTimeAlignment) {
                        fetchAndApplyEphemeris();
                        // refresh periodically while enabled
                        ephemerisInterval = setInterval(fetchAndApplyEphemeris, 60 * 1000);
                    } else {
                        if (ephemerisInterval) {
                            clearInterval(ephemerisInterval);
                            ephemerisInterval = null;
                        }
                    }
                });
            }

            let ephemerisInterval = null;

            async function fetchAndApplyEphemeris() {
                try {
                    const resp = await fetch('/api/ephemeris');
                    if (!resp.ok) return;
                    const data = await resp.json();
                    if (!data || !data.results) return;

                    // Map results by key and apply positions to pivots if available
                    const map = {};
                    data.results.forEach(r => { map[r.key] = r; });

                    celestialObjects.forEach((obj, key) => {
                        const res = map[key];
                        if (!res) return;
                        // If the server returned a position, tween the pivot position/rotation
                        if (res.position) {
                            // Move pivot to the correct rotational angle around Y axis: compute desired rotation
                            // Since pivot holds the object at x=distance, we can set pivot.rotation.y to match angle derived from x/z
                            const desiredAngle = Math.atan2(res.position.z, res.position.x);
                            // tween pivot.rotation.y smoothly
                            new TWEEN.Tween({ r: obj.pivot.rotation.y })
                                .to({ r: desiredAngle }, 800)
                                .easing(TWEEN.Easing.Cubic.Out)
                                .onUpdate(function(v) { obj.pivot.rotation.y = v.r; })
                                .start();
                        } else if (res.angle !== undefined) {
                            const desiredAngle = res.angle;
                            new TWEEN.Tween({ r: obj.pivot.rotation.y })
                                .to({ r: desiredAngle }, 800)
                                .easing(TWEEN.Easing.Cubic.Out)
                                .onUpdate(function(v) { obj.pivot.rotation.y = v.r; })
                                .start();
                        }
                    });
                } catch (e) {
                    console.warn('Failed to fetch ephemeris', e);
                }
            }
            
            document.getElementById('pauseBtn').addEventListener('click', function() {
                isPaused = !isPaused;
                this.textContent = isPaused ? 'Resume Animation' : 'Pause Animation';
            });
            
            document.getElementById('resetViewBtn').addEventListener('click', function() {
                cameraTarget.set(0, 0, 0);
                cameraRadius = 200;
                cameraTheta = 0;
                cameraPhi = Math.PI / 4;
                animationSpeed = 1;
                document.getElementById('speedControl').value = 1;
                document.getElementById('zoomControl').value = 200;
                document.getElementById('info-panel').classList.remove('visible');
            });

            // Animation loop
            const clock = new THREE.Clock();
            function animate() {
                requestAnimationFrame(animate);
                
                    if (!isPaused) {
                        const elapsedTime = clock.getElapsedTime();

                        // If real-time alignment is enabled, compute orbital angle from J2000 and orbital period
                        const now = Date.now();
                        const daysSinceJ2000 = (now - J2000) / (1000 * 60 * 60 * 24);

                        celestialObjects.forEach(({ group, pivot }) => {
                            const data = group.userData;

                            // Orbital motion
                            if (pivot && data.distance) {
                                if (useRealTimeAlignment && orbitalPeriods[data.key]) {
                                    // Compute fraction of orbit completed since J2000
                                    const periodDays = orbitalPeriods[data.key];
                                    const frac = (daysSinceJ2000 % periodDays) / periodDays;
                                    // Convert to angle (radians)
                                    pivot.rotation.y = frac * Math.PI * 2;
                                } else {
                                    // Fallback: incremental rotation for demo scene
                                    const orbitalFactor = 1.5; // tweak to make orbits more visible
                                    pivot.rotation.y += (data.speed || 0) * animationSpeed * 0.01 * orbitalFactor;
                                }
                            }

                            // Rotation (spin)
                            if (group && group.rotation) {
                                group.rotation.y += (data.rotationSpeed || 0.002) * animationSpeed;
                            }
                        });
                        
                        // Animate space traffic objects
                        spaceTrafficObjects.forEach(satellite => {
                            const data = satellite.userData;
                            
                            // Update satellite position in orbit
                            data.orbitAngle += data.speed * animationSpeed;
                            
                            satellite.position.x = data.orbitRadius * Math.cos(data.orbitAngle);
                            satellite.position.y = data.orbitRadius * Math.sin(data.inclination) * Math.sin(data.orbitAngle);
                            satellite.position.z = data.orbitRadius * Math.sin(data.orbitAngle) * Math.cos(data.inclination);
                        });
                    
                        // Animate stars
                        stars.rotation.y += 0.0001 * animationSpeed;
                }
                
                // Smoothly interpolate current camera state toward desired state
                cameraTarget.lerp(desiredCameraTarget, 0.14);
                cameraRadius = THREE.MathUtils.lerp(cameraRadius, desiredCameraRadius, 0.14);
                cameraTheta = THREE.MathUtils.lerp(cameraTheta, desiredCameraTheta, 0.14);
                cameraPhi = THREE.MathUtils.lerp(cameraPhi, desiredCameraPhi, 0.14);

                // Update camera position based on smoothed state
                camera.position.x = cameraTarget.x + cameraRadius * Math.sin(cameraPhi) * Math.sin(cameraTheta);
                camera.position.y = cameraTarget.y + cameraRadius * Math.cos(cameraPhi);
                camera.position.z = cameraTarget.z + cameraRadius * Math.sin(cameraPhi) * Math.cos(cameraTheta);
                camera.lookAt(cameraTarget);

                // Lens flare positioning: project Sun position to screen
                if (lensflareEl && lensflareEnabled) {
                    const sunObj = celestialObjects.get('sun')?.group || celestialObjects.get('sun')?.pivot;
                    if (sunObj) {
                        const sunWorld = new THREE.Vector3();
                        sunObj.getWorldPosition(sunWorld);
                        const vector = sunWorld.clone().project(camera);
                        const sx = (vector.x * 0.5 + 0.5) * window.innerWidth;
                        const sy = ( -vector.y * 0.5 + 0.5) * window.innerHeight;
                        lensflareEl.style.left = Math.round(sx - 100) + 'px';
                        lensflareEl.style.top = Math.round(sy - 100) + 'px';
                        // fade based on whether sun is on-screen (z in front)
                        lensflareEl.style.opacity = (vector.z < 1 && vector.z > -1) ? '1' : '0';
                    } else {
                        lensflareEl.style.opacity = '0';
                    }
                } else if (lensflareEl) {
                    lensflareEl.style.opacity = '0';
                }

                TWEEN.update();
                renderer.render(scene, camera);
            }
            
            animate();

            // Background music was removed; no autoplay attempt needed.

            // Handle window resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        });
    </script>
</body>
</html>
