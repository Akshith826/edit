<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spaceverse — Space Education</title>
    <meta name="description" content="Explore the solar system in stunning 3D. Discover planets, moons, and more.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

    <!-- Three.js + GLTFLoader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        /* ─── Reset & Base ─────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #03030f;
            --text:      #e6f1ff;
            --muted:     rgba(230,241,255,0.5);
            --accent:    #00f3ff;
            --glass-bg:  rgba(255,255,255,0.04);
            --glass-bd:  rgba(255,255,255,0.1);
        }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
        }

        /* ─── WebGL Canvas ─────────────────────────── */
        #three-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            display: block;
        }

        /* ─── Loader ───────────────────────────────── */
        #loader {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: opacity .6s ease;
        }
        #loader.hidden { opacity: 0; pointer-events: none; }
        .loader-ring {
            width: 60px; height: 60px;
            border: 3px solid rgba(0,243,255,0.15);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-label {
            font-family: 'Orbitron', sans-serif;
            font-size: .85rem;
            letter-spacing: 3px;
            color: var(--muted);
            text-transform: uppercase;
        }
        .loader-bar-wrap {
            width: 220px; height: 3px;
            background: rgba(255,255,255,0.06);
            border-radius: 99px; overflow: hidden;
        }
        #loader-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #bc13fe);
            width: 0;
            transition: width .2s ease;
            border-radius: 99px;
        }

        /* ─── Top Nav / Planet Selector ───────────────── */
        #top-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 68px;
            background: rgba(3,3,15,0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-bd);
        }

        .nav-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-decoration: none;
            color: var(--text);
            display: flex; align-items: center; gap: 10px;
        }

        #planet-selector {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            scrollbar-width: none;
            max-width: 70vw;
        }
        #planet-selector::-webkit-scrollbar { display: none; }

        .psel-btn {
            flex-shrink: 0;
            background: transparent;
            border: 1px solid transparent;
            color: var(--muted);
            padding: 7px 16px;
            border-radius: 30px;
            font-family: 'Inter', sans-serif;
            font-size: .8rem;
            font-weight: 600;
            letter-spacing: .5px;
            cursor: pointer;
            transition: all .25s ease;
            white-space: nowrap;
        }
        .psel-btn:hover {
            color: var(--text);
            border-color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
        }
        .psel-btn.active {
            color: #000;
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 18px rgba(0,243,255,.5);
        }

        .nav-back {
            text-decoration: none;
            color: var(--muted);
            font-size: .85rem;
            font-weight: 600;
            display: flex; align-items: center; gap: 6px;
            transition: color .25s;
        }
        .nav-back:hover { color: var(--text); }

        /* ─── HUD Overlay ──────────────────────────── */
        #hud {
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: 520px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 68px 60px 40px 60px;
            pointer-events: none;
        }

        .hud-sub {
            font-size: .75rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 14px;
            opacity: 0;
        }

        .hud-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3.5rem, 6vw, 6rem);
            font-weight: 900;
            line-height: 1.0;
            letter-spacing: -.01em;
            color: var(--text);
            margin-bottom: 18px;
            opacity: 0;
        }

        .hud-desc {
            font-size: 1rem;
            line-height: 1.7;
            color: rgba(230,241,255,.72);
            max-width: 360px;
            margin-bottom: 32px;
            opacity: 0;
        }

        .hud-stats {
            display: flex;
            gap: 24px;
            margin-bottom: 36px;
            opacity: 0;
        }
        .hud-stat {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .hud-stat-label {
            font-size: .7rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
        }
        .hud-stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
        }

        .hud-actions {
            display: flex;
            gap: 14px;
            pointer-events: all;
            opacity: 0;
        }
        .btn-primary {
            padding: 13px 28px;
            background: var(--accent);
            border: none;
            border-radius: 30px;
            color: #000;
            font-family: 'Inter', sans-serif;
            font-size: .875rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform .2s, box-shadow .2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0,243,255,.5);
        }
        .btn-glass {
            padding: 12px 26px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-bd);
            border-radius: 30px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: .875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .25s;
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-glass:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.04);
            border-color: rgba(255,255,255,0.25);
        }

        /* ─── Bottom hint ──────────────────────────── */
        #bottom-hint {
            position: fixed;
            bottom: 30px;
            right: 40px;
            font-size: .75rem;
            color: var(--muted);
            letter-spacing: 1px;
            z-index: 50;
            pointer-events: none;
            opacity: 0;
            animation: fadeHint 1s .5s forwards, pulseHint 3s 1.5s ease-in-out infinite;
        }
        @keyframes fadeHint { to { opacity: 1; } }
        @keyframes pulseHint { 0%,100% { opacity: .5 } 50% { opacity: 1 } }

        /* ─── Vignette ─────────────────────────────── */
        #vignette {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: radial-gradient(ellipse at 65% 50%, transparent 38%, rgba(3,3,15,.92) 80%);
            pointer-events: none;
        }

        /* ─── Warp-In Receive Cover ─────────────────── */
        #warp-in-cover {
            position: fixed;
            inset: 0;
            z-index: 300;
            background: #000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0s;
        }
        #warp-in-cover.visible {
            opacity: 1;
        }

        /* ─── Pulsing glow on primary button ─────────── */
        @keyframes pulseGlow {
            0%, 100% {
                box-shadow: 0 0 12px rgba(0,243,255,.5);
            }
            50% {
                box-shadow: 0 0 28px rgba(0,243,255,.9), 0 0 60px rgba(0,243,255,.25);
            }
        }
        .btn-primary {
            animation: pulseGlow 2.5s ease-in-out infinite;
        }
        .btn-primary:hover {
            animation: none;
        }
    </style>
</head>
<body>

<!-- Loader -->
<div id="loader">
    <div class="loader-ring"></div>
    <div class="loader-label" id="loader-label">Initialising Cosmos</div>
    <div class="loader-bar-wrap"><div id="loader-bar"></div></div>
</div>

<!-- Warp-In Cover (fades out when arriving via warp transition) -->
<div id="warp-in-cover"></div>

<!-- Vignette -->
<div id="vignette"></div>

<!-- WebGL Canvas -->
<canvas id="three-canvas"></canvas>

<!-- Top Navigation -->
<nav id="top-nav">
    <a href="/" class="nav-logo">🌑 SpaceEdu</a>
    <div id="planet-selector"><!-- filled by JS --></div>
    <a href="/" class="nav-back" id="homeBackBtn">← Home</a>
</nav>

<!-- HUD -->
<div id="hud">
    <div class="hud-sub"  id="hud-sub">Solar System</div>
    <div class="hud-title" id="hud-title">EARTH</div>
    <div class="hud-desc"  id="hud-desc">Our home planet, the only world known to support life.</div>
    <div class="hud-stats" id="hud-stats">
        <div class="hud-stat">
            <div class="hud-stat-label">Day Length</div>
            <div class="hud-stat-value" id="stat-day">—</div>
        </div>
        <div class="hud-stat">
            <div class="hud-stat-label">Year Length</div>
            <div class="hud-stat-value" id="stat-year">—</div>
        </div>
        <div class="hud-stat">
            <div class="hud-stat-label">Distance</div>
            <div class="hud-stat-value" id="stat-dist">—</div>
        </div>
    </div>
    <div class="hud-actions" id="hud-actions">
        <button class="btn-primary" id="btn-quiz">🧠 Take Quiz</button>
        <button class="btn-glass" id="btn-more">Learn More →</button>
    </div>
</div>

<div id="bottom-hint">DRAG TO ROTATE  •  CLICK PLANET TO EXPLORE</div>

<script>
window.addEventListener('load', function() {
    (async function () {
    'use strict';
    try {

    // ─── Planet meta (stats, description) ──────────────────────────────
    const PLANET_META = {
        sun:     { sub:'Our Star', desc:'The Sun — a G-type main-sequence star — is the gravitational anchor of the Solar System, containing 99.86% of its total mass.', day:'~25 Earth days', year:'—', dist:'0 AU', glb:'/models/the_star_sun.glb', color:'#ffdd57' },
        mercury: { sub:'Innermost Planet', desc:'Mercury is the smallest planet in the Solar System and the closest to the Sun, with surface temperatures swinging from -180°C to 430°C.', day:'59 Earth days', year:'88 Earth days', dist:'0.39 AU', glb:'/models/mercury_planet.glb', color:'#b0b0b0' },
        venus:   { sub:'Second Planet', desc:'Venus is the hottest planet, shrouded in thick sulfuric acid clouds. Its surface pressure is 90× that of Earth.', day:'243 Earth days', year:'225 Earth days', dist:'0.72 AU', glb:'/models/planet_venus.glb', color:'#e8a030' },
        earth:   { sub:'Our Home World', desc:'Earth is the third planet from the Sun and the only astronomical object confirmed to harbour life — 71% of its surface covered by liquid water.', day:'24 hours', year:'365.25 days', dist:'1.00 AU', glb:'/models/Earth_1_12756.glb', color:'#00c6ff' },
        mars:    { sub:'The Red Planet', desc:'Mars is the fourth planet from the Sun, a cold desert world with the largest volcano and canyon in the Solar System.', day:'24.6 hours', year:'687 Earth days', dist:'1.52 AU', glb:'/models/mars.glb', color:'#e05c30' },
        jupiter: { sub:'King of Planets', desc:'Jupiter is the largest planet — more massive than all others combined. Its Great Red Spot has been raging for over 350 years.', day:'9.9 hours', year:'11.9 Earth years', dist:'5.20 AU', glb:'/models/jupiter.glb', color:'#c8913b' },
        saturn:  { sub:'Lord of the Rings', desc:'Saturn\'s iconic ring system extends 282,000 km yet is only ~10 m thick. It is so light it would float in water.', day:'10.7 hours', year:'29.5 Earth years', dist:'9.58 AU', glb:'/models/saturn.glb', color:'#d4af72' },
        uranus:  { sub:'The Ice Giant', desc:'Uranus rotates on a ~98° axial tilt — essentially on its side — causing extreme 42-year-long seasons.', day:'17.2 hours', year:'84 Earth years', dist:'19.2 AU', glb:'/models/realistic_uranus_4k.glb', color:'#7de8e8' },
        neptune: { sub:'Windiest Planet', desc:'Neptune\'s supersonic winds reach 2,100 km/h. Discovered mathematically before observation, it orbits the Sun every 165 years.', day:'16.1 hours', year:'164.8 Earth years', dist:'30.1 AU', glb:'/models/neptune.glb', color:'#4080f0' },
    };

    // ─── Three.js Setup ──────────────────────────────────────────────
    const canvas   = document.getElementById('three-canvas');
    const scene    = new THREE.Scene();
    const camera   = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.01, 1000);
    camera.position.set(0, 0, 6);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.outputEncoding = THREE.sRGBEncoding;

    // Lights
    const ambientLight = new THREE.AmbientLight(0x101828, 8);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xfff4e6, 4);
    sunLight.position.set(8, 4, 6);
    scene.add(sunLight);

    const rimLight = new THREE.DirectionalLight(0x223060, 1.5);
    rimLight.position.set(-6, -2, -4);
    scene.add(rimLight);

    // ─── Parallax Starfield ──────────────────────────────────────────
    function makeStars(count, spread, size, opacity) {
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(count * 3);
        for (let i = 0; i < count * 3; i++) pos[i] = (Math.random() - .5) * spread;
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const mat = new THREE.PointsMaterial({ color: 0xffffff, size, transparent: true, opacity, sizeAttenuation: true });
        return new THREE.Points(geo, mat);
    }
    const starsNear = makeStars(800,  80, .04, .9);
    const starsFar  = makeStars(3000, 300, .025, .6);
    scene.add(starsNear, starsFar);

    // ─── Sprite Glow Factory ─────────────────────────────────────────
    function makeGlowSprite(colorHex, scaleR) {
        const sz = 256;
        const cv = document.createElement('canvas');
        cv.width = cv.height = sz;
        const ctx = cv.getContext('2d');
        const grd = ctx.createRadialGradient(sz/2, sz/2, 0, sz/2, sz/2, sz/2);
        grd.addColorStop(0,   colorHex + 'cc');
        grd.addColorStop(.35, colorHex + '55');
        grd.addColorStop(1,   colorHex + '00');
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, sz, sz);
        const tex = new THREE.CanvasTexture(cv);
        const mat = new THREE.SpriteMaterial({ map: tex, blending: THREE.AdditiveBlending, depthWrite: false, transparent: true });
        const sprite = new THREE.Sprite(mat);
        sprite.scale.set(scaleR, scaleR, 1);
        return sprite;
    }

    // ─── Planet Model / Sphere State ─────────────────────────────────
    let currentGroup = null;
    let currentKey   = null;
    let targetQuatKey = null;
    let _rotating    = true;
    let _manualDrag  = false;
    const gltfLoader = new THREE.GLTFLoader();
    const texLoader  = new THREE.TextureLoader();

    const FALLBACK_TEX_URLS = {
        sun:     '/images/GSFC_20171208_Archive_e001435~orig.jpg',
        mercury: '/images/mercury.jpg',
        venus:   '/images/venus.jpg',
        earth:   '/images/earth.jpg',
        mars:    '/images/mars.jpg',
        jupiter: '/images/jupiter.webp',
        saturn:  '/images/saturn.webp',
        uranus:  '/images/Uranus.jpg',
        neptune: '/images/neptune.jpg',
    };

    function loadPlanetGroup(key, meta, onProgress) {
        return new Promise((resolve) => {
            const group = new THREE.Group();
            const glow  = makeGlowSprite(meta.color || '#ffffff', 6);
            group.add(glow);

            gltfLoader.load(
                meta.glb,
                (gltf) => {
                    const m = gltf.scene;
                    // Normalize scale to radius ~1.4
                    const box = new THREE.Box3().setFromObject(m);
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale = 2.8 / maxDim;
                    m.scale.setScalar(scale);
                    m.traverseVisible(c => { if (c.isMesh) c.castShadow = true; });
                    group.add(m);
                    resolve(group);
                },
                (xhr) => { if (onProgress) onProgress(xhr.loaded / (xhr.total || 1)); },
                () => {
                    // Fallback sphere
                    const geo = new THREE.SphereGeometry(1.4, 64, 64);
                    const tex = texLoader.load(FALLBACK_TEX_URLS[key] || '');
                    const isEmissive = key === 'sun';
                    const mat = isEmissive
                        ? new THREE.MeshBasicMaterial({ map: tex })
                        : new THREE.MeshStandardMaterial({ map: tex, roughness: .6, metalness: .1 });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.userData.key = key;

                    // Saturn ring fallback
                    if (key === 'saturn') {
                        const ringGeo = new THREE.RingGeometry(1.8, 3.2, 64);
                        const ringTex = texLoader.load('https://s3-us-west-2.amazonaws.com/s.cdpn.io/17271/2k_saturn_ring_alpha.png');
                        const ringMat = new THREE.MeshBasicMaterial({ map: ringTex, side: THREE.DoubleSide, transparent: true, opacity: .8 });
                        const ring = new THREE.Mesh(ringGeo, ringMat);
                        ring.rotation.x = Math.PI / 2.5;
                        group.add(ring);
                    }
                    group.add(mesh);
                    resolve(group);
                }
            );
        });
    }

    // ─── Fetch Planet Data ───────────────────────────────────────────
    const loaderLabel = document.getElementById('loader-label');
    const loaderBar   = document.getElementById('loader-bar');

    let planets = [];
    try {
        const resp = await fetch('/api/planets');
        planets = await resp.json();
    } catch (e) {
        // Fallback to meta keys
        planets = Object.keys(PLANET_META).map(k => ({ key: k, name: k.charAt(0).toUpperCase() + k.slice(1) }));
    }
    planets.sort((a,b) => (a.distance || 0) - (b.distance || 0));

    // ─── Build Top Nav ───────────────────────────────────────────────
    const selector = document.getElementById('planet-selector');
    planets.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'psel-btn';
        btn.dataset.key = p.key;
        btn.textContent = (p.name || p.key).toUpperCase();
        btn.addEventListener('click', () => selectPlanet(p.key));
        selector.appendChild(btn);
    });

    // ─── HUD Animation ───────────────────────────────────────────────
    const hudEls = {
        sub:     document.getElementById('hud-sub'),
        title:   document.getElementById('hud-title'),
        desc:    document.getElementById('hud-desc'),
        stats:   document.getElementById('hud-stats'),
        actions: document.getElementById('hud-actions'),
    };
    const statDay  = document.getElementById('stat-day');
    const statYear = document.getElementById('stat-year');
    const statDist = document.getElementById('stat-dist');
    const btnQuiz  = document.getElementById('btn-quiz');
    const btnMore  = document.getElementById('btn-more');

    function hudFlyOut() {
        return gsap.to(Object.values(hudEls), {
            opacity: 0, x: -40, duration: .35, stagger: .05, ease: 'power2.in'
        });
    }

    function hudFlyIn(key, planet) {
        const meta = PLANET_META[key] || {};
        hudEls.sub.textContent   = meta.sub   || planet.name || key;
        hudEls.title.textContent = (planet.name || key).toUpperCase();
        hudEls.desc.textContent  = meta.desc  || (planet.info ? planet.info.replace(/<[^>]+>/g,'') : '');
        statDay.textContent  = meta.day  || '—';
        statYear.textContent = meta.year || '—';
        statDist.textContent = meta.dist || '—';

        btnQuiz.onclick = () => window.location.href = `/quiz?planet=${key}`;
        btnMore.onclick = () => {}; // extend as needed

        gsap.set(Object.values(hudEls), { x: -60, opacity: 0 });
        return gsap.to(Object.values(hudEls), {
            opacity: 1, x: 0, duration: .55, stagger: .1, ease: 'power3.out', delay: .15
        });
    }

    // ─── Camera Dolly ────────────────────────────────────────────────
    function dollyCameraIn() {
        gsap.fromTo(camera.position, { z: 9 }, { z: 5.5, duration: 1.4, ease: 'power2.inOut' });
    }

    function dollyCameraOut() {
        gsap.to(camera.position, { z: 9, duration: .8, ease: 'power2.in' });
    }

    // ─── Select Planet ───────────────────────────────────────────────
    let _selecting = false;

    async function selectPlanet(key) {
        if (key === currentKey || _selecting) return;
        _selecting = true;

        // Update nav buttons
        document.querySelectorAll('.psel-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.key === key);
        });

        // Fly out HUD
        await hudFlyOut();

        // Remove old planet
        if (currentGroup) {
            dollyCameraOut();
            await gsap.to(currentGroup.scale, { x: 0, y: 0, z: 0, duration: .5, ease: 'power2.in' });
            scene.remove(currentGroup);
            currentGroup = null;
        }

        // Load new planet
        const planet = planets.find(p => p.key === key) || { key, name: key };
        const meta   = PLANET_META[key] || {};

        loaderLabel.textContent = `Loading ${planet.name || key}…`;
        const loader = document.getElementById('loader');
        loader.style.opacity = '1';
        loader.style.pointerEvents = 'all';

        let progress = 0;
        const group = await loadPlanetGroup(key, meta, (p) => {
            progress = p;
            loaderBar.style.width = (p * 100) + '%';
        });

        loader.style.opacity = '0';
        loader.style.pointerEvents = 'none';
        loaderBar.style.width = '0';

        group.scale.set(0.01, 0.01, 0.01);
        scene.add(group);
        currentGroup = group;
        currentKey   = key;

        // Dolly in + scale in
        dollyCameraIn();
        gsap.to(group.scale, { x: 1, y: 1, z: 1, duration: .9, ease: 'back.out(1.2)' });

        hudFlyIn(key, planet);
        _selecting = false;
    }

    // ─── Load Default (Earth) ─────────────────────────────────────────
    loaderLabel.textContent = 'Calibrating Sensors…';
    let defaultKey = 'earth';
    if (!planets.find(p => p.key === 'earth')) defaultKey = planets[0]?.key || 'mercury';

    // Show all planets load progress
    loaderBar.style.width = '20%';
    loaderLabel.textContent = 'Warping in…';

    await selectPlanet(defaultKey);

    // Hide initial loader
    const initLoader = document.getElementById('loader');
    initLoader.classList.add('hidden');
    setTimeout(() => initLoader.style.display = 'none', 700);

    // ─── Rotation Control ─────────────────────────────────────────────
    let _mouseX = 0, _mouseY = 0;
    let _prevX = 0, _prevY = 0;
    let _isDragging = false;
    let _velX = 0, _velY = 0;

    canvas.addEventListener('mousedown', e => {
        _isDragging = true;
        _manualDrag = true;
        _prevX = e.clientX;
        _prevY = e.clientY;
        _velX = _velY = 0;
        canvas.style.cursor = 'grabbing';
    });

    window.addEventListener('mousemove', e => {
        _mouseX = (e.clientX / innerWidth  - .5) * 2;
        _mouseY = (e.clientY / innerHeight - .5) * 2;
        if (_isDragging && currentGroup) {
            const dx = e.clientX - _prevX;
            const dy = e.clientY - _prevY;
            _velX = dx * .006;
            _velY = dy * .006;
            currentGroup.rotation.y += _velX;
            currentGroup.rotation.x += _velY;
            _prevX = e.clientX;
            _prevY = e.clientY;
        }
    });

    window.addEventListener('mouseup', () => {
        _isDragging = false;
        canvas.style.cursor = 'default';
        setTimeout(() => _manualDrag = false, 1200);
    });

    // Touch support
    let _lastTouchX = 0, _lastTouchY = 0;
    canvas.addEventListener('touchstart', e => {
        _lastTouchX = e.touches[0].clientX;
        _lastTouchY = e.touches[0].clientY;
    }, { passive: true });
    canvas.addEventListener('touchmove', e => {
        if (!currentGroup) return;
        const dx = e.touches[0].clientX - _lastTouchX;
        const dy = e.touches[0].clientY - _lastTouchY;
        currentGroup.rotation.y += dx * .005;
        currentGroup.rotation.x += dy * .005;
        _lastTouchX = e.touches[0].clientX;
        _lastTouchY = e.touches[0].clientY;
        _manualDrag = true;
    }, { passive: true });

    // Click on globe to select
    const raycaster = new THREE.Raycaster();
    const mouse2    = new THREE.Vector2();
    canvas.addEventListener('click', e => {
        mouse2.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
        raycaster.setFromCamera(mouse2, camera);
        if (!currentGroup) return;
        const hits = raycaster.intersectObjects(currentGroup.children, true);
        if (hits.length > 0) {
            gsap.to(currentGroup.scale, { x: 1.08, y: 1.08, z: 1.08, duration: .15, yoyo: true, repeat: 1, ease: 'power1.out' });
        }
    });

    // ─── Animation Loop ───────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const dt = clock.getDelta();

        // Slow idle planet rotation
        if (currentGroup && !_isDragging && !_manualDrag) {
            const rotSpd = 0.12; // radians per second
            currentGroup.rotation.y += rotSpd * dt;
            // Inertia damping from drag
            currentGroup.rotation.y += _velX;
            currentGroup.rotation.x += _velY;
            _velX *= 0.88;
            _velY *= 0.88;
        }

        // Parallax starfield on mouse move
        starsNear.rotation.x += (_mouseY * .003 - starsNear.rotation.x) * .04;
        starsNear.rotation.y += (_mouseX * .003 - starsNear.rotation.y) * .04;
        starsFar.rotation.x  += (_mouseY * .0015 - starsFar.rotation.x)  * .02;
        starsFar.rotation.y  += (_mouseX * .0015 - starsFar.rotation.y)  * .02;

        renderer.render(scene, camera);
    }
    animate();

    // ─── Resize ───────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
    });

    } catch(err) {
        console.error('Solar system init error:', err);
        const lbl = document.getElementById('loader-label');
        const loader = document.getElementById('loader');
        if (lbl) lbl.textContent = 'Error: ' + (err.message || String(err));
        if (loader) loader.style.background = 'rgba(60,0,0,0.95)';
    }
    })();
});
</script>

<script>
(function() {
    // ─── Warp-In Fade Out (arriving from home.html) ──────────────────
    const cover = document.getElementById('warp-in-cover');
    if (cover) {
        const params = new URLSearchParams(window.location.search);
        if (params.get('warp') === '1') {
            // Start fully opaque black
            cover.style.opacity = '1';
            cover.style.transition = 'opacity 0s';

            // After page is fully ready, fade the cover out
            window.addEventListener('load', function() {
                // Small delay so the planet scene has a moment to draw first
                setTimeout(function() {
                    cover.style.transition = 'opacity 1.4s cubic-bezier(0.4, 0, 0.2, 1)';
                    cover.style.opacity = '0';
                }, 800);
            });
        }
    }

    // ─── Home Back Button — mini fade-to-black ────────────────────────
    const homeBtn = document.getElementById('homeBackBtn');
    if (homeBtn) {
        homeBtn.addEventListener('click', function(e) {
            e.preventDefault();
            const dest = homeBtn.getAttribute('href') || '/';
            if (cover) {
                cover.style.transition = 'opacity 0.5s ease';
                cover.style.opacity = '1';
                setTimeout(() => window.location.href = dest, 520);
            } else {
                window.location.href = dest;
            }
        });
    }
})();
</script>
